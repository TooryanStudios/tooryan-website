name: Upload Image to FTP

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Image filename'
        required: true
      content:
        description: 'Base64 encoded image content'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Decode and prepare image
      run: |
        mkdir -p temp_images
        echo "${{ github.event.inputs.content }}" | base64 -d > "temp_images/${{ github.event.inputs.filename }}"
        
    - name: Upload image to FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./temp_images/
        server-dir: /public_html/images/
        
    - name: Update manifest.json on FTP
      run: |
        # Install tools for FTP + JSON generation
        sudo apt-get update
        sudo apt-get install -y lftp jq

        # Build manifest from the actual FTP folder contents
        lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; cls -1 /public_html/images" > remote_files.txt
        grep -Ei '\.(png|jpg|jpeg|gif|webp|svg)$' remote_files.txt | sort | jq -R -s 'split("\n") | map(select(length > 0))' > manifest_updated.json

        # Upload regenerated manifest
        lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; put manifest_updated.json -o /public_html/images/manifest.json"
        
    - name: Cleanup
      run: |
        rm -rf temp_images
        rm -f remote_files.txt manifest_updated.json
