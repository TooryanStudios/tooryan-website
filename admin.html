<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooryan Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07101f;
            --panel: #101a31;
            --panel-2: #14203c;
            --border: rgba(255,255,255,0.1);
            --text: #eef3ff;
            --muted: #98a6c7;
            --gold: #d2a54c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #07101f 0%, #091426 100%);
            color: var(--text);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .wrap {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 60% 30% 10%;
            gap: 0;
        }
        .panel-column {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 12px;
            backdrop-filter: blur(14px);
            position: relative;
            min-height: 100%;
            overflow: auto;
            display: flex;
            flex-direction: column;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .panel-column,
        #imagesList,
        #imageGallery {
            scrollbar-width: thin;
            scrollbar-color: rgba(152, 166, 199, 0.55) rgba(7, 16, 31, 0.25);
        }
        .panel-column::-webkit-scrollbar,
        #imagesList::-webkit-scrollbar,
        #imageGallery::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        .panel-column::-webkit-scrollbar-track,
        #imagesList::-webkit-scrollbar-track,
        #imageGallery::-webkit-scrollbar-track {
            background: rgba(7, 16, 31, 0.25);
            border-radius: 999px;
        }
        .panel-column::-webkit-scrollbar-thumb,
        #imagesList::-webkit-scrollbar-thumb,
        #imageGallery::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(152, 166, 199, 0.7), rgba(122, 138, 176, 0.6));
            border-radius: 999px;
        }
        .panel-column::-webkit-scrollbar-thumb:hover,
        #imagesList::-webkit-scrollbar-thumb:hover,
        #imageGallery::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(176, 192, 230, 0.85), rgba(140, 160, 206, 0.8));
        }
        .panel {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(14px);
            position: sticky;
            top: 24px;
            max-height: calc(100vh - 48px);
            overflow: auto;
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .side-menu button {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 14px;
            border-radius: 16px;
            color: var(--text);
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }
        .side-menu button.active {
            background: rgba(210,175,60,0.25);
            border-color: rgba(210,175,60,0.5);
        }
        .section-pane {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .section-pane.active {
            display: flex;
        }
        .preview {
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: hidden;
            height: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .lead {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }
        .panel-column .btn {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 999px;
            padding: 12px 16px;
            font-weight: 400;
            cursor: pointer;
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--gold), #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .group {
            margin-bottom: 14px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .group h2 {
            font-size: 1rem;
            margin-bottom: 14px;
            color: var(--gold);
            font-weight: 400;
        }
        .group.collapsed .group-body {
            display: none;
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .group-header h2 {
            margin: 0;
        }
        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }
        .field label {
            font-size: 0.75rem;
            color: var(--muted);
        }
        input, textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(6, 11, 24, 0.88);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        .array-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .array-entry {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .array-entry-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .array-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
        }
        .btn.mini {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 999px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: white;
        }
        .panel-section {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }
        .preview-column {
            position: relative;
            background: transparent;
            border-radius: 0;
            overflow: hidden;
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            padding: 12px 4px;
            background: rgba(4,5,11,0.95);
            border-radius: 0;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .menu-column::before {
            display: none;
        }
        .menu-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .menu-controls .btn {
            width: 100%;
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            padding: 12px 16px;
            font-weight: 400;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .menu-controls .btn.primary {
            background: linear-gradient(135deg, #d2a54c, #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .panel-column::-webkit-scrollbar,
        .menu-column::-webkit-scrollbar,
        .section-pane::-webkit-scrollbar {
            width: 8px;
        }
        .panel-column::-webkit-scrollbar-track,
        .menu-column::-webkit-scrollbar-track,
        .section-pane::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .panel-column::-webkit-scrollbar-thumb,
        .menu-column::-webkit-scrollbar-thumb,
        .section-pane::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(210,175,60,0.6), rgba(210,175,60,0.2));
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .menu-column::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(210,175,60,0.25);
            border-radius: 999px;
            pointer-events: none;
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        .side-menu button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .side-menu button.active {
            color: var(--text);
            font-weight: 700;
        }
        .hint {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.6;
        }
        .image-field-tools {
            margin-top: 8px;
            display: grid;
            gap: 8px;
        }
        .image-preview {
            width: 100%;
            min-height: 90px;
            border: 1px dashed rgba(255,255,255,0.16);
            border-radius: 12px;
            background: rgba(4, 10, 20, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .image-preview img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            display: block;
        }
        .image-preview-empty {
            color: var(--muted);
            font-size: 0.74rem;
            text-align: center;
            padding: 10px;
        }
        .image-field-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .image-picker-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 14, 0.72);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .image-picker-modal.open {
            display: flex;
        }
        .image-picker-panel {
            width: min(820px, 100%);
            max-height: min(78vh, 700px);
            background: rgba(10, 18, 36, 0.96);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .image-picker-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .image-picker-grid {
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding-right: 4px;
        }
        .image-picker-item {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            padding: 6px;
            cursor: pointer;
            display: grid;
            gap: 6px;
        }
        .image-picker-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        .image-picker-item span {
            font-size: 0.68rem;
            color: var(--muted);
            line-height: 1.35;
            overflow-wrap: anywhere;
        }
        @media (max-width: 1100px) {
            .wrap { grid-template-columns: 1fr; }
            .panel { position: static; max-height: none; }
            iframe { height: 75vh; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="preview-column panel-section">
            <section class="preview">
                <iframe src="./index.html" id="previewFrame" title="Website preview"></iframe>
            </section>
        </div>
        <div class="panel-column">
            <h1>Tooryan Admin <span id="buildVersion" style="font-size:0.5em; color:var(--muted); font-weight:400;">v...</span> <span id="buildStatus" style="font-size:0.35em; font-weight:600; letter-spacing:0.04em; padding:3px 8px; border-radius:999px; background:rgba(255,255,255,0.1); color:var(--muted); vertical-align:middle;">Checking...</span></h1>
            <div class="hint" style="margin-bottom:18px;" id="pathInfo">
                <p>Admin HTML: <strong id="adminPath">Loading...</strong></p>
                <p>Data JSON: <strong id="dataPath">Loading...</strong></p>
                <p>Site images: <strong id="imagesPath">Loading...</strong></p>
                <div style="margin-top:12px; padding:12px; background:rgba(0,0,0,0.3); border-radius:12px; border:1px solid rgba(255,255,255,0.08);">
                    <p style="margin-bottom:8px; font-weight:500;">Images in folder:</p>
                    <div id="imagesList" style="font-size:0.8rem; color:var(--muted); max-height:150px; overflow:auto; scrollbar-gutter:stable both-edges; padding-right:6px; white-space:nowrap;">
                        <p>Scanning...</p>
                    </div>
                </div>
            </div>
            <form id="adminForm">
                <div id="sectionPanels">
                    <div id="imageManagerPane" class="section-pane" data-section="image-manager">
                        <section class="group">
                            <h2>Image Manager</h2>
                            <div class="field">
                                <label>Upload New Image(s)</label>
                                <input type="file" id="imageUpload" accept="image/*" multiple style="padding:8px;">
                                <button type="button" class="btn" id="uploadBtn" style="margin-top:8px; width:100%;">Upload to Server</button>
                            </div>
                            <div class="field" style="margin-top:15px;">
                                <label>Browse Uploaded Images</label>
                                <button type="button" class="btn mini" id="refreshImagesBtn" style="margin-bottom:8px;">Refresh Images Folder</button>
                                <div id="imageGallery" style="display:flex; flex-wrap:wrap; gap:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; border: 1px solid rgba(255,255,255,0.08);">
                                    <p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>
                                </div>
                                <p style="color:var(--muted); font-size:0.75rem; margin-top:5px;">Click an image to copy its URL, then paste it into any image field below.</p>
                            </div>
                        </section>
                    </div>
                    <div id="dynamicSectionPanels"></div>
                </div>
            </form>
        </div>
        <div class="menu-column">
            <div class="menu-controls">
                <button class="btn primary" id="saveBtn">Save</button>
                <button class="btn" id="resetBtn">Reset</button>
                <button class="btn" id="refreshBtn">Refresh</button>
                <button class="btn" id="expandAllBtn">Expand</button>
                <button class="btn" id="collapseAllBtn">Collapse</button>
            </div>
            <div class="side-menu" id="sideMenu"></div>
        </div>
    </div>
    <script src="./site-config.js"></script>
    <script>
        let imagesBasePath = './images/';

        function normalizeImageNames(items) {
            if (!Array.isArray(items)) return [];
            return items
                .map((img) => String(img || '').replace('./images/', '').trim())
                .filter(Boolean);
        }

        function setBuildStatus(label, tone = 'muted') {
            const statusEl = document.getElementById('buildStatus');
            if (!statusEl) return;
            const tones = {
                ok: { background: 'rgba(76, 210, 120, 0.18)', color: '#9ff2be' },
                pending: { background: 'rgba(210, 165, 76, 0.2)', color: '#f2cf86' },
                warn: { background: 'rgba(255, 99, 99, 0.2)', color: '#ffadad' },
                muted: { background: 'rgba(255,255,255,0.1)', color: 'var(--muted)' }
            };
            const style = tones[tone] || tones.muted;
            statusEl.textContent = label;
            statusEl.style.background = style.background;
            statusEl.style.color = style.color;
        }

        async function loadImagesFolderList() {
            const imagesListEl = document.getElementById('imagesList');
            if (!imagesListEl) return;
            imagesListEl.innerHTML = '<p>Scanning...</p>';
            const cacheBuster = `t=${Date.now()}`;

            try {
                const res = await fetch(`/api/list_images?${cacheBuster}`, { cache: 'no-store' });
                const data = await res.json();
                const images = normalizeImageNames(data?.images);
                if (images.length > 0) {
                    imagesListEl.innerHTML = images.map((img) => `<div style="margin-bottom:4px;">• ${img}</div>`).join('');
                    return;
                }
                imagesListEl.innerHTML = '<p style="color:var(--muted);">No images found</p>';
            } catch (err) {
                try {
                    const res = await fetch(`${imagesBasePath}manifest.json?${cacheBuster}`, { cache: 'no-store' });
                    const images = normalizeImageNames(await res.json());
                    if (images.length > 0) {
                        imagesListEl.innerHTML = images.map((img) => `<div style="margin-bottom:4px;">• ${img}</div>`).join('');
                    } else {
                        imagesListEl.innerHTML = '<p style="color:var(--muted);">No images found</p>';
                    }
                } catch (manifestErr) {
                    imagesListEl.innerHTML = '<p style="color:var(--muted);">Unable to list images (manifest not found)</p>';
                    console.log('Image listing error:', err, manifestErr);
                }
            }
        }

        // Dynamically detect and display current paths
        (function() {
            const currentURL = window.location.href;
            const origin = window.location.origin;
            const pathname = window.location.pathname;
            const baseDir = pathname.substring(0, pathname.lastIndexOf('/') + 1);
            
            const adminPath = currentURL;
            const dataPath = origin + baseDir + 'data.json';
            const imagesPath = origin + baseDir + 'images/';
            imagesBasePath = imagesPath;
            
            document.getElementById('adminPath').textContent = adminPath;
            document.getElementById('dataPath').textContent = dataPath;
            document.getElementById('imagesPath').textContent = imagesPath;
            
            // Fetch and display build version + deploy status
            setBuildStatus('Checking...', 'muted');
            fetch(origin + baseDir + `version.json?t=${Date.now()}`, { cache: 'no-store' })
                .then(res => res.json())
                .then(async (version) => {
                    document.getElementById('buildVersion').textContent = `v${version.build} (${version.commit})`;
                    setBuildStatus('Live', 'ok');

                    try {
                        const latestRes = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/commits/main', { cache: 'no-store' });
                        if (!latestRes.ok) return;
                        const latestCommit = await latestRes.json();
                        const latestSha = String(latestCommit?.sha || '').slice(0, 7);
                        if (latestSha && String(version.commit || '').slice(0, 7) !== latestSha) {
                            setBuildStatus('Pending Deploy', 'pending');
                        } else if (latestSha) {
                            setBuildStatus('Live', 'ok');
                        }
                    } catch (e) {
                        console.log('Unable to verify latest GitHub commit for deploy status:', e);
                    }
                })
                .catch(() => {
                    document.getElementById('buildVersion').textContent = 'v1.0.0';
                    setBuildStatus('Unknown', 'warn');
                });
            
            loadImagesFolderList();
        })();

        const groups = {
            Hero: ['heroEyebrow', 'heroTitleHtml', 'heroDescription', 'heroImage', 'heroCard1Label', 'heroCard1Title', 'heroCard1Text', 'heroCard2Label', 'heroCard2Title', 'heroCard2Text', 'heroCard3Label', 'heroCard3Title', 'heroCard3Text'],
            Featured: ['featuredHeading', 'featuredText'],
            Vision: ['visionTitle', 'visionText', 'floatingImg1', 'floatingImg2', 'floatingImg3', 'quote'],
            Contact: ['contactTitle', 'contactText', 'phone', 'email', 'location']
        };

        const arrayConfig = {
            featuredSlides: {
                label: 'Featured Slides',
                singular: 'Slide',
                titleKey: 'title',
                fields: [
                    { key: 'badge', label: 'Badge (optional)', type: 'text' },
                    { key: 'label', label: 'Label (optional)', type: 'text' },
                    { key: 'title', label: 'Title', type: 'text' },
                    { key: 'subtitle', label: 'Subtitle (optional)', type: 'text' },
                    { key: 'text', label: 'Body copy', type: 'textarea' },
                    { key: 'image', label: 'Image URL', type: 'text' }
                ],
                defaultEntry: () => ({ title: '', text: '' })
            },
            services: {
                label: 'Services',
                singular: 'Service',
                titleKey: 'title',
                fields: [
                    { key: 'title', label: 'Title', type: 'text' },
                    { key: 'subtitle', label: 'Subtitle (optional)', type: 'text' },
                    { key: 'text', label: 'Description', type: 'textarea' },
                    { key: 'image', label: 'Image URL', type: 'text' }
                ],
                defaultEntry: () => ({ title: '', text: '' })
            }
        };

        let content = {};
        const form = document.getElementById('adminForm');
        const previewFrame = document.getElementById('previewFrame');
        const sideMenu = document.getElementById('sideMenu');
        let autoFillTarget = null;
        let imagePickerModal = null;
        let imagePickerGrid = null;
        let imagePickerTargetInput = null;
        let imagePickerTargetPreview = null;

        function isLongField(key) {
            return key.toLowerCase().includes('text') || key.toLowerCase().includes('description') || key.toLowerCase().includes('html') || key === 'quote';
        }

        function prettify(key) {
            return key.replace(/([A-Z])/g, ' $1').replace(/^./, (char) => char.toUpperCase());
        }

        function setGroupExpanded(group, expand = true) {
            if (!group) return;
            const shouldExpand = typeof expand === 'boolean' ? expand : !group.classList.contains('collapsed');
            group.classList.toggle('collapsed', !shouldExpand);
            const toggleBtn = group.querySelector('.group-header .toggle-btn');
            if (toggleBtn) {
                toggleBtn.textContent = shouldExpand ? 'Collapse' : 'Expand';
            }
            return shouldExpand;
        }

        function createGroupHeader(title, group) {
            const header = document.createElement('div');
            header.className = 'group-header';
            const heading = document.createElement('h2');
            heading.textContent = title;
            const toggle = document.createElement('button');
            toggle.type = 'button';
            toggle.className = 'btn mini toggle-btn';
            toggle.textContent = 'Collapse';
            toggle.addEventListener('click', () => {
                const isExpanded = !group.classList.contains('collapsed');
                setGroupExpanded(group, !isExpanded);
            });
            header.appendChild(heading);
            header.appendChild(toggle);
            return header;
        }

        function attachAutoFillListeners(input, onValueUpdate) {
            input.addEventListener('focus', () => {
                autoFillTarget = input;
            });
            input.addEventListener('click', () => {
                autoFillTarget = input;
            });
            if (typeof onValueUpdate === 'function') {
                input.addEventListener('input', () => {
                    onValueUpdate(input.value);
                });
            }
        }

        function isImageField(key = '', label = '') {
            const value = `${key} ${label}`.toLowerCase();
            return value.includes('image') || value.includes('img');
        }

        function resolveImageUrl(value) {
            const raw = String(value || '').trim();
            if (!raw) return '';
            if (/^(https?:\/\/|data:|blob:)/i.test(raw)) return raw;
            if (raw.startsWith('./images/')) return `${imagesBasePath}${raw.replace('./images/', '')}`;
            if (raw.startsWith('images/')) return `${imagesBasePath}${raw.replace('images/', '')}`;
            try {
                return new URL(raw, window.location.href).href;
            } catch {
                return raw;
            }
        }

        function setImagePreview(previewEl, value) {
            if (!previewEl) return;
            const src = resolveImageUrl(value);
            if (!src) {
                previewEl.innerHTML = '<div class="image-preview-empty">No image selected</div>';
                return;
            }
            previewEl.innerHTML = '';
            const img = document.createElement('img');
            img.src = `${src}${src.includes('?') ? '&' : '?'}t=${Date.now()}`;
            img.alt = 'Image preview';
            img.onerror = () => {
                previewEl.innerHTML = '<div class="image-preview-empty">Unable to load preview</div>';
            };
            previewEl.appendChild(img);
        }

        async function fetchAvailableImageNames() {
            const cacheBuster = `t=${Date.now()}`;
            try {
                const manifestRes = await fetch(`${imagesBasePath}manifest.json?${cacheBuster}`, { cache: 'no-store' });
                if (!manifestRes.ok) throw new Error('Manifest not available');
                return normalizeImageNames(await manifestRes.json());
            } catch (manifestErr) {
                console.log('Manifest image list unavailable, trying API fallback:', manifestErr);
            }
            try {
                const apiRes = await fetch(`/api/list_images?${cacheBuster}`, { cache: 'no-store' });
                const data = await apiRes.json();
                return normalizeImageNames(data?.images);
            } catch {
                return [];
            }
        }

        function ensureImagePickerModal() {
            if (imagePickerModal) return;
            imagePickerModal = document.createElement('div');
            imagePickerModal.className = 'image-picker-modal';
            imagePickerModal.innerHTML = `
                <div class="image-picker-panel">
                    <div class="image-picker-head">
                        <strong>Select Image from Library</strong>
                        <button type="button" class="btn mini" data-image-picker-close>Close</button>
                    </div>
                    <div class="image-picker-grid" id="imagePickerGrid">
                        <p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>
                    </div>
                </div>
            `;
            document.body.appendChild(imagePickerModal);
            imagePickerGrid = imagePickerModal.querySelector('#imagePickerGrid');
            imagePickerModal.addEventListener('click', (event) => {
                if (event.target === imagePickerModal || event.target.matches('[data-image-picker-close]')) {
                    imagePickerModal.classList.remove('open');
                }
            });
        }

        async function openImagePickerForInput(input, previewEl) {
            ensureImagePickerModal();
            imagePickerTargetInput = input;
            imagePickerTargetPreview = previewEl;
            imagePickerModal.classList.add('open');
            imagePickerGrid.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>';
            const imageNames = await fetchAvailableImageNames();
            if (!imageNames.length) {
                imagePickerGrid.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">No images found in library.</p>';
                return;
            }
            imagePickerGrid.innerHTML = '';
            imageNames.forEach((name) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'image-picker-item';
                item.innerHTML = `<img src="${imagesBasePath}${encodeURIComponent(name)}?t=${Date.now()}" alt="${name}"><span>${name}</span>`;
                item.addEventListener('click', () => {
                    const selectedUrl = `./images/${name}`;
                    imagePickerTargetInput.value = selectedUrl;
                    imagePickerTargetInput.dispatchEvent(new Event('input', { bubbles: true }));
                    autoFillTarget = imagePickerTargetInput;
                    setImagePreview(imagePickerTargetPreview, selectedUrl);
                    imagePickerModal.classList.remove('open');
                });
                imagePickerGrid.appendChild(item);
            });
        }

        async function uploadSingleForImageField(input, previewEl, triggerBtn) {
            const chooser = document.createElement('input');
            chooser.type = 'file';
            chooser.accept = 'image/*';
            chooser.style.display = 'none';
            document.body.appendChild(chooser);

            chooser.addEventListener('change', async () => {
                const file = chooser.files && chooser.files[0];
                chooser.remove();
                if (!file) return;

                const previousValue = input.value;
                const tempPreviewUrl = URL.createObjectURL(file);
                setImagePreview(previewEl, tempPreviewUrl);
                triggerBtn.disabled = true;
                const previousLabel = triggerBtn.textContent;
                triggerBtn.textContent = 'Uploading...';

                try {
                    const result = await uploadFilesBatch([file], (index, total) => {
                        triggerBtn.textContent = `Uploading ${index}/${total}`;
                    });
                    const uploadedUrl = result.uploadedUrls[0];
                    if (uploadedUrl) {
                        input.value = uploadedUrl;
                        input.dispatchEvent(new Event('input', { bubbles: true }));
                        autoFillTarget = input;
                    } else {
                        input.value = previousValue;
                        input.dispatchEvent(new Event('input', { bubbles: true }));
                        const reason = result.failedFiles.join('\n') || 'Upload failed.';
                        alert(`Image upload failed.\n\n${reason}`);
                    }
                } finally {
                    URL.revokeObjectURL(tempPreviewUrl);
                    setImagePreview(previewEl, input.value);
                    triggerBtn.disabled = false;
                    triggerBtn.textContent = previousLabel;
                }
            });

            chooser.click();
        }

        function enhanceImageInput(input, labelText = '') {
            if (!input || input.dataset.imageEnhanced === 'true') return;
            input.dataset.imageEnhanced = 'true';

            const tools = document.createElement('div');
            tools.className = 'image-field-tools';

            const preview = document.createElement('div');
            preview.className = 'image-preview';
            setImagePreview(preview, input.value);
            input.addEventListener('input', () => {
                setImagePreview(preview, input.value);
            });

            const actions = document.createElement('div');
            actions.className = 'image-field-actions';

            const libraryBtn = document.createElement('button');
            libraryBtn.type = 'button';
            libraryBtn.className = 'btn mini';
            libraryBtn.textContent = 'From Library';
            libraryBtn.addEventListener('click', () => openImagePickerForInput(input, preview));

            const uploadBtn = document.createElement('button');
            uploadBtn.type = 'button';
            uploadBtn.className = 'btn mini';
            uploadBtn.textContent = 'Upload New';
            uploadBtn.addEventListener('click', () => uploadSingleForImageField(input, preview, uploadBtn));

            actions.appendChild(libraryBtn);
            actions.appendChild(uploadBtn);
            tools.appendChild(preview);
            tools.appendChild(actions);

            input.insertAdjacentElement('afterend', tools);
            if (isImageField(input.name || input.dataset.arrayField || '', labelText)) {
                attachAutoFillListeners(input);
            }
        }

        function createArrayEntry(config, entryData = {}) {
            const card = document.createElement('div');
            card.className = 'array-entry';
            const header = document.createElement('div');
            header.className = 'array-entry-title';
            const title = document.createElement('span');
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'btn mini';
            removeBtn.textContent = 'Remove';
            removeBtn.addEventListener('click', () => {
                card.remove();
            });
            header.appendChild(title);
            header.appendChild(removeBtn);
            card.appendChild(header);

            const updateTitle = () => {
                const titleField = card.querySelector(`[data-array-field="${config.titleKey}"]`);
                title.textContent = titleField && titleField.value ? titleField.value : `${config.singular}`;
            };

            config.fields.forEach((field) => {
                const fieldWrapper = document.createElement('div');
                fieldWrapper.className = 'field';
                const label = document.createElement('label');
                label.textContent = field.label;
                const input = field.type === 'textarea' ? document.createElement('textarea') : document.createElement('input');
                if (input.tagName === 'INPUT') {
                    input.type = field.type === 'textarea' ? 'text' : field.type;
                }
                input.dataset.arrayField = field.key;
                input.value = entryData[field.key] || '';
                fieldWrapper.appendChild(label);
                fieldWrapper.appendChild(input);
                attachAutoFillListeners(input, (value) => {
                    if (field.key === config.titleKey) {
                        updateTitle();
                    }
                });
                if (input.tagName === 'INPUT' && isImageField(field.key, field.label)) {
                    enhanceImageInput(input, field.label);
                }
                card.appendChild(fieldWrapper);
            });

            updateTitle();
            return card;
        }

        function createSectionPane(id) {
            const pane = document.createElement('div');
            pane.className = 'section-pane';
            pane.dataset.section = id;
            return pane;
        }

        function registerSideMenuEntry(id, label) {
            const existing = sideMenu.querySelector(`[data-section-toggle="${id}"]`);
            if (existing) return;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.dataset.sectionToggle = id;
            btn.textContent = label;
            btn.addEventListener('click', () => activateSection(id));
            sideMenu.appendChild(btn);
        }

        function activateSection(id) {
            document.querySelectorAll('.section-pane').forEach((pane) => {
                pane.classList.toggle('active', pane.dataset.section === id);
            });
            sideMenu.querySelectorAll('button').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.sectionToggle === id);
            });
        }

        function createArraySection(arrayKey, config) {
            const section = document.createElement('section');
            section.className = 'group';
            section.id = `${arrayKey}Section`;
            const body = document.createElement('div');
            body.className = 'group-body';
            const header = createGroupHeader(config.label, section);

            const list = document.createElement('div');
            list.className = 'array-list';
            const entries = (Array.isArray(content[arrayKey]) && content[arrayKey].length) ? content[arrayKey] : [config.defaultEntry()];
            entries.forEach((entry) => {
                list.append(createArrayEntry(config, entry));
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'btn mini';
            addBtn.textContent = `Add ${config.singular}`;
            addBtn.addEventListener('click', () => {
                list.append(createArrayEntry(config, config.defaultEntry()));
            });

            body.appendChild(list);
            body.appendChild(addBtn);
            section.appendChild(header);
            section.appendChild(body);
            return section;
        }

        function buildForm() {
            sideMenu.innerHTML = '';
            const sectionOrder = [];
            const panelsContainer = document.getElementById('dynamicSectionPanels');
            panelsContainer.innerHTML = '';

            registerSideMenuEntry('image-manager', 'Image Manager');
            sectionOrder.push('image-manager');

            Object.entries(groups).forEach(([title, keys]) => {
                const paneId = title.toLowerCase().replace(/\s+/g, '-');
                const pane = createSectionPane(paneId);
                const group = document.createElement('section');
                group.className = 'group';
                const header = createGroupHeader(title, group);
                const body = document.createElement('div');
                body.className = 'group-body';

                keys.forEach((key) => {
                    const field = document.createElement('div');
                    field.className = 'field';
                    const label = document.createElement('label');
                    label.setAttribute('for', key);
                    label.textContent = prettify(key);
                    field.appendChild(label);

                    let input;
                    if (isLongField(key)) {
                        input = document.createElement('textarea');
                    } else {
                        input = document.createElement('input');
                        input.type = 'text';
                    }
                    input.id = key;
                    input.name = key;
                    input.value = content[key] || '';
                    field.appendChild(input);
                    attachAutoFillListeners(input);
                    if (input.tagName === 'INPUT' && isImageField(key, label.textContent)) {
                        enhanceImageInput(input, label.textContent);
                    }
                    body.appendChild(field);
                });

                group.appendChild(header);
                group.appendChild(body);
                pane.appendChild(group);
                registerSideMenuEntry(paneId, title);
                sectionOrder.push(paneId);
                panelsContainer.appendChild(pane);
            });

            Object.entries(arrayConfig).forEach(([arrayKey, config]) => {
                const pane = createSectionPane(arrayKey);
                pane.appendChild(createArraySection(arrayKey, config));
                registerSideMenuEntry(arrayKey, config.label);
                sectionOrder.push(arrayKey);
                panelsContainer.appendChild(pane);
            });

            const firstSection = sectionOrder[0];
            if (firstSection) activateSection(firstSection);

            const collapseAllBtn = document.createElement('button');
            collapseAllBtn.type = 'button';
            collapseAllBtn.className = 'btn mini';
            collapseAllBtn.textContent = 'Collapse All';
            collapseAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.group').forEach((group) => setGroupExpanded(group, false));
            });

            const expandAllBtn = document.createElement('button');
            expandAllBtn.type = 'button';
            expandAllBtn.className = 'btn mini';
            expandAllBtn.textContent = 'Expand All';
            expandAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.group').forEach((group) => setGroupExpanded(group, true));
            });

            panelsContainer.appendChild(collapseAllBtn);
            panelsContainer.appendChild(expandAllBtn);
        }

        function collectForm() {
            const data = {};
            new FormData(form).forEach((value, key) => {
                data[key] = value;
            });

            Object.keys(arrayConfig).forEach((arrayKey) => {
                const section = document.getElementById(`${arrayKey}Section`);
                if (!section) return;
                const entries = Array.from(section.querySelectorAll('.array-entry'));
                data[arrayKey] = entries.map((entry) => {
                    const entryData = {};
                    entry.querySelectorAll('[data-array-field]').forEach((input) => {
                        entryData[input.dataset.arrayField] = input.value;
                    });
                    return entryData;
                });
            });

            return data;
        }

        function refreshPreview() {
            previewFrame.contentWindow.location.reload();
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            document.getElementById('saveBtn').textContent = 'Saving...';
            await window.saveTooryanContent(collectForm());
            document.getElementById('saveBtn').textContent = 'Save changes';
            refreshPreview();
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            if(confirm('Are you sure you want to reset to default content?')) {
                await window.resetTooryanContent();
                content = await window.getTooryanContent();
                buildForm();
                refreshPreview();
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', refreshPreview);

        // --- Image Manager Logic ---

        function renderGalleryImages(imageNames) {
            const gallery = document.getElementById('imageGallery');
            if (!gallery) return;
            gallery.innerHTML = '';
            if (imageNames.length === 0) {
                gallery.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">No images uploaded yet.</p>';
                return;
            }

            imageNames.forEach((imageName) => {
                const img = document.createElement('img');
                const relativeUrl = `./images/${imageName}`;
                img.src = `${imagesBasePath}${encodeURIComponent(imageName)}?t=${Date.now()}`;
                img.style.width = '60px';
                img.style.height = '60px';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '5px';
                img.style.cursor = 'pointer';
                img.title = 'Click to copy URL';
                img.onclick = () => {
                    navigator.clipboard.writeText(relativeUrl).then(() => {
                        alert('Copied URL: ' + relativeUrl);
                    });
                };
                gallery.appendChild(img);
            });
        }

        async function loadGallery() {
            const gallery = document.getElementById('imageGallery');
            if (!gallery) return;
            gallery.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>';
            const imageNames = await fetchAvailableImageNames();
            if (!imageNames.length) {
                gallery.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">No images uploaded yet.</p>';
                return;
            }
            renderGalleryImages(imageNames);
        }

        document.getElementById('refreshImagesBtn').addEventListener('click', async () => {
            await Promise.all([loadGallery(), loadImagesFolderList()]);
        });

        function getGitHubToken() {
            let token = localStorage.getItem('github_token');
            if (!token) {
                token = prompt('Enter your GitHub Personal Access Token (with repo permissions):\n\nThis will be saved locally for future uploads.');
                if (!token) return null;
                localStorage.setItem('github_token', token);
            }
            return token;
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(String(e.target.result || '').split(',')[1] || '');
                reader.onerror = () => reject(new Error('Failed to read file.'));
                reader.readAsDataURL(file);
            });
        }

        async function uploadSingleViaLocal(file) {
            const formData = new FormData();
            formData.append('image', file);

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });
                const data = await res.json();
                if (data.status !== 'success' || !data.url) {
                    throw new Error('Local upload returned unexpected response.');
                }
                return data.url;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function uploadSingleViaGitHub(file, token) {
            const githubHeaders = {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            };
            const base64Content = await readFileAsBase64(file);
            const timestamp = Date.now();
            const randomSuffix = Math.random().toString(36).slice(2, 6);
            const cleanName = file.name.replace(/[^a-zA-Z0-9.-]/g, "_");
            const filename = `${timestamp}_${randomSuffix}_${cleanName}`;

            const imagePath = `images/${filename}`;
            const uploadResponse = await fetch(`https://api.github.com/repos/TooryanStudios/tooryan-website/contents/${imagePath}`, {
                method: 'PUT',
                headers: githubHeaders,
                body: JSON.stringify({
                    message: `Upload image: ${filename}`,
                    content: base64Content,
                    branch: 'main'
                })
            });

            if (!uploadResponse.ok) {
                const uploadError = await uploadResponse.text();
                throw new Error(uploadError);
            }

            const manifestResponse = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/images/manifest.json?ref=main', {
                headers: githubHeaders
            });

            let manifestList = [];
            let manifestSha = null;

            if (manifestResponse.ok) {
                const manifestData = await manifestResponse.json();
                manifestSha = manifestData.sha || null;
                const decoded = atob((manifestData.content || '').replace(/\n/g, ''));
                try {
                    manifestList = JSON.parse(decoded);
                } catch {
                    manifestList = [];
                }
            }

            if (!manifestList.includes(filename)) {
                manifestList.push(filename);
            }

            const manifestContent = btoa(JSON.stringify(manifestList, null, 2) + '\n');
            const manifestBody = {
                message: `Update image manifest for ${filename}`,
                content: manifestContent,
                branch: 'main'
            };
            if (manifestSha) manifestBody.sha = manifestSha;

            const manifestUpdateResponse = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/images/manifest.json', {
                method: 'PUT',
                headers: githubHeaders,
                body: JSON.stringify(manifestBody)
            });

            if (!manifestUpdateResponse.ok) {
                const manifestError = await manifestUpdateResponse.text();
                throw new Error(manifestError);
            }

            return `./images/${filename}`;
        }

        async function uploadFilesBatch(files, onProgress) {
            let useGitHub = false;
            let githubToken = null;
            const uploadedUrls = [];
            const failedFiles = [];

            for (let i = 0; i < files.length; i += 1) {
                const file = files[i];
                if (typeof onProgress === 'function') {
                    onProgress(i + 1, files.length, file);
                }

                try {
                    let url;
                    if (!useGitHub) {
                        try {
                            url = await uploadSingleViaLocal(file);
                        } catch (localErr) {
                            useGitHub = true;
                            console.log('Local upload unavailable, switching to GitHub fallback:', localErr?.message || localErr);
                        }
                    }

                    if (useGitHub) {
                        if (!githubToken) {
                            githubToken = getGitHubToken();
                            if (!githubToken) throw new Error('GitHub token is required to continue uploads.');
                        }
                        url = await uploadSingleViaGitHub(file, githubToken);
                    }

                    uploadedUrls.push(url);
                } catch (fileErr) {
                    const errorMessage = fileErr?.message || 'Upload failed';
                    failedFiles.push(`${file.name}: ${errorMessage}`);
                    if (String(errorMessage).includes('GitHub token is required')) {
                        break;
                    }
                    if (String(errorMessage).includes('Bad credentials')) {
                        localStorage.removeItem('github_token');
                        githubToken = null;
                    }
                }
            }

            return { uploadedUrls, failedFiles, usedGitHub: useGitHub };
        }

        document.getElementById('uploadBtn').addEventListener('click', async (event) => {
            event.preventDefault();
            const fileInput = document.getElementById('imageUpload');
            const files = Array.from(fileInput.files || []);
            if (files.length === 0) {
                alert('Please select one or more images first.');
                return;
            }

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;

            try {
                const result = await uploadFilesBatch(files, (index, total) => {
                    btn.textContent = `Uploading ${index}/${total}...`;
                });
                const uploadedUrls = result.uploadedUrls;
                const failedFiles = result.failedFiles;

                if (uploadedUrls.length > 0) {
                    const clipboardText = uploadedUrls.join('\n');
                    navigator.clipboard.writeText(clipboardText);
                    if (autoFillTarget && uploadedUrls.length === 1) {
                        autoFillTarget.value = uploadedUrls[0];
                    }
                    fileInput.value = '';
                    await Promise.all([loadGallery(), loadImagesFolderList()]);

                    let message = `${uploadedUrls.length} image(s) uploaded successfully. URL list copied to clipboard.`;
                    if (result.usedGitHub) {
                        message += '\n\nDeploy will publish GitHub uploads in ~1-2 minutes.';
                    }
                    if (failedFiles.length > 0) {
                        message += `\n\n${failedFiles.length} failed:\n- ${failedFiles.join('\n- ')}`;
                    }
                    alert(message);
                } else {
                    alert(`No images were uploaded.\n\n${failedFiles.join('\n') || 'Unknown error.'}`);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload to Server';
            }
        });

        // Initialize Async
        async function initAdmin() {
            content = await window.getTooryanContent();
            buildForm();
            loadGallery();
        }
        
        initAdmin();

    </script>
