<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooryan Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07101f;
            --panel: #101a31;
            --panel-2: #14203c;
            --border: rgba(255,255,255,0.1);
            --text: #eef3ff;
            --muted: #98a6c7;
            --gold: #d2a54c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #07101f 0%, #091426 100%);
            color: var(--text);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .wrap {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 60% 30% 10%;
            gap: 0;
        }
        .panel-column {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 12px;
            backdrop-filter: blur(14px);
            position: relative;
            min-height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .panel {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(14px);
            position: sticky;
            top: 24px;
            max-height: calc(100vh - 48px);
            overflow: auto;
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .side-menu button {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 14px;
            border-radius: 16px;
            color: var(--text);
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }
        .side-menu button.active {
            background: rgba(210,175,60,0.25);
            border-color: rgba(210,175,60,0.5);
        }
        .section-pane {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .section-pane.active {
            display: flex;
        }
        .preview {
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: hidden;
            height: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .lead {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }
        .panel-column .btn {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 999px;
            padding: 12px 16px;
            font-weight: 400;
            cursor: pointer;
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--gold), #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .group {
            margin-bottom: 14px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .group h2 {
            font-size: 1rem;
            margin-bottom: 14px;
            color: var(--gold);
            font-weight: 400;
        }
        .group.collapsed .group-body {
            display: none;
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .group-header h2 {
            margin: 0;
        }
        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }
        .field label {
            font-size: 0.75rem;
            color: var(--muted);
        }
        input, textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(6, 11, 24, 0.88);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        .array-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .array-entry {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .array-entry-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .array-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
        }
        .btn.mini {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 999px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: white;
        }
        .panel-section {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }
        .preview-column {
            position: relative;
            background: transparent;
            border-radius: 0;
            overflow: hidden;
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            padding: 12px 4px;
            background: rgba(4,5,11,0.95);
            border-radius: 0;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .menu-column::before {
            display: none;
        }
        .menu-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .menu-controls .btn {
            width: 100%;
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            padding: 12px 16px;
            font-weight: 400;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .menu-controls .btn.primary {
            background: linear-gradient(135deg, #d2a54c, #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .panel-column::-webkit-scrollbar,
        .menu-column::-webkit-scrollbar,
        .section-pane::-webkit-scrollbar {
            width: 8px;
        }
        .panel-column::-webkit-scrollbar-track,
        .menu-column::-webkit-scrollbar-track,
        .section-pane::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .panel-column::-webkit-scrollbar-thumb,
        .menu-column::-webkit-scrollbar-thumb,
        .section-pane::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(210,175,60,0.6), rgba(210,175,60,0.2));
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .menu-column::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(210,175,60,0.25);
            border-radius: 999px;
            pointer-events: none;
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        .side-menu button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .side-menu button.active {
            color: var(--text);
            font-weight: 700;
        }
        .hint {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.6;
        }
        @media (max-width: 1100px) {
            .wrap { grid-template-columns: 1fr; }
            .panel { position: static; max-height: none; }
            iframe { height: 75vh; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="preview-column panel-section">
            <section class="preview">
                <iframe src="./index.html" id="previewFrame" title="Website preview"></iframe>
            </section>
        </div>
        <div class="panel-column">
            <h1>Tooryan Admin <span id="buildVersion" style="font-size:0.5em; color:var(--muted); font-weight:400;">v...</span></h1>
            <div class="hint" style="margin-bottom:18px;" id="pathInfo">
                <p>Admin HTML: <strong id="adminPath">Loading...</strong></p>
                <p>Data JSON: <strong id="dataPath">Loading...</strong></p>
                <p>Site images: <strong id="imagesPath">Loading...</strong></p>
                <div style="margin-top:12px; padding:12px; background:rgba(0,0,0,0.3); border-radius:12px; border:1px solid rgba(255,255,255,0.08);">
                    <p style="margin-bottom:8px; font-weight:500;">Images in folder:</p>
                    <div id="imagesList" style="font-size:0.8rem; color:var(--muted); max-height:150px; overflow-y:auto;">
                        <p>Scanning...</p>
                    </div>
                </div>
            </div>
            <form id="adminForm">
                <div id="sectionPanels">
                    <div id="imageManagerPane" class="section-pane" data-section="image-manager">
                        <section class="group">
                            <h2>Image Manager</h2>
                            <div class="field">
                                <label>Upload New Image</label>
                                <input type="file" id="imageUpload" accept="image/*" style="padding:8px;">
                                <button class="btn" id="uploadBtn" style="margin-top:8px; width:100%;">Upload to Server</button>
                            </div>
                            <div class="field" style="margin-top:15px;">
                                <label>Browse Uploaded Images</label>
                                <div id="imageGallery" style="display:flex; flex-wrap:wrap; gap:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; border: 1px solid rgba(255,255,255,0.08);">
                                    <p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>
                                </div>
                                <p style="color:var(--muted); font-size:0.75rem; margin-top:5px;">Click an image to copy its URL, then paste it into any image field below.</p>
                            </div>
                        </section>
                    </div>
                    <div id="dynamicSectionPanels"></div>
                </div>
            </form>
        </div>
        <div class="menu-column">
            <div class="menu-controls">
                <button class="btn primary" id="saveBtn">Save</button>
                <button class="btn" id="resetBtn">Reset</button>
                <button class="btn" id="refreshBtn">Refresh</button>
                <button class="btn" id="expandAllBtn">Expand</button>
                <button class="btn" id="collapseAllBtn">Collapse</button>
            </div>
            <div class="side-menu" id="sideMenu"></div>
        </div>
    </div>
    <script src="./site-config.js"></script>
    <script>
        // Dynamically detect and display current paths
        (function() {
            const currentURL = window.location.href;
            const origin = window.location.origin;
            const pathname = window.location.pathname;
            const baseDir = pathname.substring(0, pathname.lastIndexOf('/') + 1);
            
            const adminPath = currentURL;
            const dataPath = origin + baseDir + 'data.json';
            const imagesPath = origin + baseDir + 'images/';
            
            document.getElementById('adminPath').textContent = adminPath;
            document.getElementById('dataPath').textContent = dataPath;
            document.getElementById('imagesPath').textContent = imagesPath;
            
            // Fetch and display build version
            fetch(origin + baseDir + 'version.json')
                .then(res => res.json())
                .then(version => {
                    document.getElementById('buildVersion').textContent = `v${version.build} (${version.commit})`;
                })
                .catch(() => {
                    document.getElementById('buildVersion').textContent = 'v1.0.0';
                });
            
            // Attempt to list images in the folder
            const imagesListEl = document.getElementById('imagesList');
            
            // Try using the existing /api/list_images endpoint first
            fetch('/api/list_images')
                .then(res => res.json())
                .then(images => {
                    if (images && images.length > 0) {
                        imagesListEl.innerHTML = images.map(img => 
                            `<div style="margin-bottom:4px;">• ${img}</div>`
                        ).join('');
                    } else {
                        imagesListEl.innerHTML = '<p style="color:var(--muted);">No images found</p>';
                    }
                })
                .catch(err => {
                    // If API fails, fall back to static manifest
                    fetch(imagesPath + 'manifest.json')
                        .then(res => res.json())
                        .then(images => {
                            if (images && images.length > 0) {
                                imagesListEl.innerHTML = images.map(img => 
                                    `<div style="margin-bottom:4px;">• ${img}</div>`
                                ).join('');
                            } else {
                                imagesListEl.innerHTML = '<p style="color:var(--muted);">No images found</p>';
                            }
                        })
                        .catch(manifestErr => {
                            imagesListEl.innerHTML = '<p style="color:var(--muted);">Unable to list images (manifest not found)</p>';
                            console.log('Image listing error:', err, manifestErr);
                        });
                });
        })();

        const groups = {
            Hero: ['heroEyebrow', 'heroTitleHtml', 'heroDescription', 'heroImage', 'heroCard1Label', 'heroCard1Title', 'heroCard1Text', 'heroCard2Label', 'heroCard2Title', 'heroCard2Text', 'heroCard3Label', 'heroCard3Title', 'heroCard3Text'],
            Featured: ['featuredHeading', 'featuredText'],
            Vision: ['visionTitle', 'visionText', 'floatingImg1', 'floatingImg2', 'floatingImg3', 'quote'],
            Contact: ['contactTitle', 'contactText', 'phone', 'email', 'location']
        };

        const arrayConfig = {
            featuredSlides: {
                label: 'Featured Slides',
                singular: 'Slide',
                titleKey: 'title',
                fields: [
                    { key: 'badge', label: 'Badge (optional)', type: 'text' },
                    { key: 'label', label: 'Label (optional)', type: 'text' },
                    { key: 'title', label: 'Title', type: 'text' },
                    { key: 'subtitle', label: 'Subtitle (optional)', type: 'text' },
                    { key: 'text', label: 'Body copy', type: 'textarea' },
                    { key: 'image', label: 'Image URL', type: 'text' }
                ],
                defaultEntry: () => ({ title: '', text: '' })
            },
            services: {
                label: 'Services',
                singular: 'Service',
                titleKey: 'title',
                fields: [
                    { key: 'title', label: 'Title', type: 'text' },
                    { key: 'subtitle', label: 'Subtitle (optional)', type: 'text' },
                    { key: 'text', label: 'Description', type: 'textarea' },
                    { key: 'image', label: 'Image URL', type: 'text' }
                ],
                defaultEntry: () => ({ title: '', text: '' })
            }
        };

        let content = {};
        const form = document.getElementById('adminForm');
        const previewFrame = document.getElementById('previewFrame');
        const sideMenu = document.getElementById('sideMenu');
        let autoFillTarget = null;

        function isLongField(key) {
            return key.toLowerCase().includes('text') || key.toLowerCase().includes('description') || key.toLowerCase().includes('html') || key === 'quote';
        }

        function prettify(key) {
            return key.replace(/([A-Z])/g, ' $1').replace(/^./, (char) => char.toUpperCase());
        }

        function setGroupExpanded(group, expand = true) {
            if (!group) return;
            const shouldExpand = typeof expand === 'boolean' ? expand : !group.classList.contains('collapsed');
            group.classList.toggle('collapsed', !shouldExpand);
            const toggleBtn = group.querySelector('.group-header .toggle-btn');
            if (toggleBtn) {
                toggleBtn.textContent = shouldExpand ? 'Collapse' : 'Expand';
            }
            return shouldExpand;
        }

        function createGroupHeader(title, group) {
            const header = document.createElement('div');
            header.className = 'group-header';
            const heading = document.createElement('h2');
            heading.textContent = title;
            const toggle = document.createElement('button');
            toggle.type = 'button';
            toggle.className = 'btn mini toggle-btn';
            toggle.textContent = 'Collapse';
            toggle.addEventListener('click', () => {
                const isExpanded = !group.classList.contains('collapsed');
                setGroupExpanded(group, !isExpanded);
            });
            header.appendChild(heading);
            header.appendChild(toggle);
            return header;
        }

        function attachAutoFillListeners(input, onValueUpdate) {
            input.addEventListener('focus', () => {
                autoFillTarget = input;
            });
            input.addEventListener('click', () => {
                autoFillTarget = input;
            });
            if (typeof onValueUpdate === 'function') {
                input.addEventListener('input', () => {
                    onValueUpdate(input.value);
                });
            }
        }

        function createArrayEntry(config, entryData = {}) {
            const card = document.createElement('div');
            card.className = 'array-entry';
            const header = document.createElement('div');
            header.className = 'array-entry-title';
            const title = document.createElement('span');
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'btn mini';
            removeBtn.textContent = 'Remove';
            removeBtn.addEventListener('click', () => {
                card.remove();
            });
            header.appendChild(title);
            header.appendChild(removeBtn);
            card.appendChild(header);

            const updateTitle = () => {
                const titleField = card.querySelector(`[data-array-field="${config.titleKey}"]`);
                title.textContent = titleField && titleField.value ? titleField.value : `${config.singular}`;
            };

            config.fields.forEach((field) => {
                const fieldWrapper = document.createElement('div');
                fieldWrapper.className = 'field';
                const label = document.createElement('label');
                label.textContent = field.label;
                const input = field.type === 'textarea' ? document.createElement('textarea') : document.createElement('input');
                if (input.tagName === 'INPUT') {
                    input.type = field.type === 'textarea' ? 'text' : field.type;
                }
                input.dataset.arrayField = field.key;
                input.value = entryData[field.key] || '';
                fieldWrapper.appendChild(label);
                fieldWrapper.appendChild(input);
                attachAutoFillListeners(input, (value) => {
                    if (field.key === config.titleKey) {
                        updateTitle();
                    }
                });
                card.appendChild(fieldWrapper);
            });

            updateTitle();
            return card;
        }

        function createSectionPane(id) {
            const pane = document.createElement('div');
            pane.className = 'section-pane';
            pane.dataset.section = id;
            return pane;
        }

        function registerSideMenuEntry(id, label) {
            const existing = sideMenu.querySelector(`[data-section-toggle="${id}"]`);
            if (existing) return;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.dataset.sectionToggle = id;
            btn.textContent = label;
            btn.addEventListener('click', () => activateSection(id));
            sideMenu.appendChild(btn);
        }

        function activateSection(id) {
            document.querySelectorAll('.section-pane').forEach((pane) => {
                pane.classList.toggle('active', pane.dataset.section === id);
            });
            sideMenu.querySelectorAll('button').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.sectionToggle === id);
            });
        }

        function createArraySection(arrayKey, config) {
            const section = document.createElement('section');
            section.className = 'group';
            section.id = `${arrayKey}Section`;
            const body = document.createElement('div');
            body.className = 'group-body';
            const header = createGroupHeader(config.label, section);

            const list = document.createElement('div');
            list.className = 'array-list';
            const entries = (Array.isArray(content[arrayKey]) && content[arrayKey].length) ? content[arrayKey] : [config.defaultEntry()];
            entries.forEach((entry) => {
                list.append(createArrayEntry(config, entry));
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'btn mini';
            addBtn.textContent = `Add ${config.singular}`;
            addBtn.addEventListener('click', () => {
                list.append(createArrayEntry(config, config.defaultEntry()));
            });

            body.appendChild(list);
            body.appendChild(addBtn);
            section.appendChild(header);
            section.appendChild(body);
            return section;
        }

        function buildForm() {
            sideMenu.innerHTML = '';
            const sectionOrder = [];
            const panelsContainer = document.getElementById('dynamicSectionPanels');
            panelsContainer.innerHTML = '';

            registerSideMenuEntry('image-manager', 'Image Manager');
            sectionOrder.push('image-manager');

            Object.entries(groups).forEach(([title, keys]) => {
                const paneId = title.toLowerCase().replace(/\s+/g, '-');
                const pane = createSectionPane(paneId);
                const group = document.createElement('section');
                group.className = 'group';
                const header = createGroupHeader(title, group);
                const body = document.createElement('div');
                body.className = 'group-body';

                keys.forEach((key) => {
                    const field = document.createElement('div');
                    field.className = 'field';
                    const label = document.createElement('label');
                    label.setAttribute('for', key);
                    label.textContent = prettify(key);
                    field.appendChild(label);

                    let input;
                    if (isLongField(key)) {
                        input = document.createElement('textarea');
                    } else {
                        input = document.createElement('input');
                        input.type = 'text';
                    }
                    input.id = key;
                    input.name = key;
                    input.value = content[key] || '';
                    field.appendChild(input);
                    attachAutoFillListeners(input);
                    body.appendChild(field);
                });

                group.appendChild(header);
                group.appendChild(body);
                pane.appendChild(group);
                registerSideMenuEntry(paneId, title);
                sectionOrder.push(paneId);
                panelsContainer.appendChild(pane);
            });

            Object.entries(arrayConfig).forEach(([arrayKey, config]) => {
                const pane = createSectionPane(arrayKey);
                pane.appendChild(createArraySection(arrayKey, config));
                registerSideMenuEntry(arrayKey, config.label);
                sectionOrder.push(arrayKey);
                panelsContainer.appendChild(pane);
            });

            const firstSection = sectionOrder[0];
            if (firstSection) activateSection(firstSection);

            const collapseAllBtn = document.createElement('button');
            collapseAllBtn.type = 'button';
            collapseAllBtn.className = 'btn mini';
            collapseAllBtn.textContent = 'Collapse All';
            collapseAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.group').forEach((group) => setGroupExpanded(group, false));
            });

            const expandAllBtn = document.createElement('button');
            expandAllBtn.type = 'button';
            expandAllBtn.className = 'btn mini';
            expandAllBtn.textContent = 'Expand All';
            expandAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.group').forEach((group) => setGroupExpanded(group, true));
            });

            panelsContainer.appendChild(collapseAllBtn);
            panelsContainer.appendChild(expandAllBtn);
        }

        function collectForm() {
            const data = {};
            new FormData(form).forEach((value, key) => {
                data[key] = value;
            });

            Object.keys(arrayConfig).forEach((arrayKey) => {
                const section = document.getElementById(`${arrayKey}Section`);
                if (!section) return;
                const entries = Array.from(section.querySelectorAll('.array-entry'));
                data[arrayKey] = entries.map((entry) => {
                    const entryData = {};
                    entry.querySelectorAll('[data-array-field]').forEach((input) => {
                        entryData[input.dataset.arrayField] = input.value;
                    });
                    return entryData;
                });
            });

            return data;
        }

        function refreshPreview() {
            previewFrame.contentWindow.location.reload();
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            document.getElementById('saveBtn').textContent = 'Saving...';
            await window.saveTooryanContent(collectForm());
            document.getElementById('saveBtn').textContent = 'Save changes';
            refreshPreview();
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            if(confirm('Are you sure you want to reset to default content?')) {
                await window.resetTooryanContent();
                content = await window.getTooryanContent();
                buildForm();
                refreshPreview();
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', refreshPreview);

        // --- Image Manager Logic ---

        async function loadGallery() {
            const gallery = document.getElementById('imageGallery');
            try {
                const res = await fetch('/api/list_images');
                const data = await res.json();
                if(data.status === 'success') {
                    gallery.innerHTML = '';
                    if(data.images.length === 0) {
                        gallery.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">No images uploaded yet.</p>';
                        return;
                    }
                    data.images.forEach(imgUrl => {
                        const img = document.createElement('img');
                        img.src = imgUrl;
                        img.style.width = '60px';
                        img.style.height = '60px';
                        img.style.objectFit = 'cover';
                        img.style.borderRadius = '5px';
                        img.style.cursor = 'pointer';
                        img.title = 'Click to copy URL';
                        img.onclick = () => {
                            navigator.clipboard.writeText(imgUrl).then(() => {
                                alert('Copied URL: ' + imgUrl);
                            });
                        };
                        gallery.appendChild(img);
                    });
                }
            } catch(e) {
                gallery.innerHTML = '<p style="color:red; font-size:0.8rem;">Failed to load images (Requires local Node server)</p>';
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('imageUpload');
            if(!fileInput.files[0]) {
                alert('Please select an image first.');
                return;
            }
            
            const btn = document.getElementById('uploadBtn');
            btn.textContent = 'Uploading...';
            
            const file = fileInput.files[0];
            
            // Try local server first (with timeout)
            let useGitHub = false;
            try {
                const formData = new FormData();
                formData.append('image', file);
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000); // 2 second timeout
                
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await res.json();
                if(data.status === 'success') {
                    navigator.clipboard.writeText(data.url);
                    if(autoFillTarget) {
                        autoFillTarget.value = data.url;
                    }
                    alert('Upload successful! URL copied to clipboard.' + (autoFillTarget ? ' Pasted into the last-selected field.' : ''));
                    fileInput.value = '';
                    loadGallery();
                    btn.textContent = 'Upload to Server';
                    return;
                }
            } catch(e) {
                // Local server not available, use GitHub Actions
                console.log('Local server unavailable, using GitHub Actions...', e.message);
                useGitHub = true;
            }
            
            if (!useGitHub) {
                btn.textContent = 'Upload to Server';
                return;
            }
            
            // Fallback to GitHub Actions workflow
            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64Content = e.target.result.split(',')[1];
                    const timestamp = Date.now();
                    const cleanName = file.name.replace(/[^a-zA-Z0-9.-]/g, "_");
                    const filename = `${timestamp}_${cleanName}`;
                    
                    // Prompt for GitHub token (you can store this in localStorage for convenience)
                    let token = localStorage.getItem('github_token');
                    if (!token) {
                        token = prompt('Enter your GitHub Personal Access Token (with repo permissions):\n\nThis will be saved locally for future uploads.');
                        if (!token) {
                            btn.textContent = 'Upload to Server';
                            return;
                        }
                        localStorage.setItem('github_token', token);
                    }
                    
                    const response = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/actions/workflows/upload-image-ftp.yml/dispatches', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            ref: 'main',
                            inputs: {
                                filename: filename,
                                content: base64Content
                            }
                        })
                    });
                    
                    if (response.status === 204) {
                        const imageUrl = `./images/${filename}`;
                        navigator.clipboard.writeText(imageUrl);
                        if(autoFillTarget) {
                            autoFillTarget.value = imageUrl;
                        }
                        alert('Upload triggered! The image will be uploaded directly to your server in ~30-60 seconds.\n\nURL copied: ' + imageUrl);
                        fileInput.value = '';
                    } else {
                        const error = await response.text();
                        alert('GitHub upload failed. Check your token permissions.\n\nError: ' + error);
                        if (response.status === 401) {
                            localStorage.removeItem('github_token');
                        }
                    }
                };
                reader.readAsDataURL(file);
            } catch(e) {
                alert('Upload failed: ' + e.message);
            }
            
            btn.textContent = 'Upload to Server';
        });

        // Initialize Async
        async function initAdmin() {
            content = await window.getTooryanContent();
            buildForm();
            loadGallery();
        }
        
        initAdmin();

    </script>
</body>
</html>
