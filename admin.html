<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooryan Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07101f;
            --panel: #101a31;
            --panel-2: #14203c;
            --border: rgba(255,255,255,0.1);
            --text: #eef3ff;
            --muted: #98a6c7;
            --gold: #d2a54c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #07101f 0%, #091426 100%);
            color: var(--text);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .wrap {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 60% 30% 10%;
            gap: 0;
        }
        .panel-column {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 12px;
            backdrop-filter: blur(14px);
            position: relative;
            min-height: 100%;
            overflow: auto;
            display: flex;
            flex-direction: column;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .panel-column,
        #imagesList,
        #imageGallery,
        .image-picker-grid {
            scrollbar-width: thin;
            scrollbar-color: rgba(152, 166, 199, 0.55) rgba(7, 16, 31, 0.25);
        }
        .panel-column::-webkit-scrollbar,
        #imagesList::-webkit-scrollbar,
        #imageGallery::-webkit-scrollbar,
        .image-picker-grid::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        .panel-column::-webkit-scrollbar-track,
        #imagesList::-webkit-scrollbar-track,
        #imageGallery::-webkit-scrollbar-track,
        .image-picker-grid::-webkit-scrollbar-track {
            background: rgba(7, 16, 31, 0.25);
            border-radius: 999px;
        }
        .panel-column::-webkit-scrollbar-thumb,
        #imagesList::-webkit-scrollbar-thumb,
        #imageGallery::-webkit-scrollbar-thumb,
        .image-picker-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(152, 166, 199, 0.7), rgba(122, 138, 176, 0.6));
            border-radius: 999px;
        }
        .panel-column::-webkit-scrollbar-thumb:hover,
        #imagesList::-webkit-scrollbar-thumb:hover,
        #imageGallery::-webkit-scrollbar-thumb:hover,
        .image-picker-grid::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(176, 192, 230, 0.85), rgba(140, 160, 206, 0.8));
        }
        .panel {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(14px);
            position: sticky;
            top: 24px;
            max-height: calc(100vh - 48px);
            overflow: auto;
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .side-menu button {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 14px;
            border-radius: 16px;
            color: var(--text);
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }
        .side-menu button.active {
            background: rgba(210,175,60,0.25);
            border-color: rgba(210,175,60,0.5);
        }
        .section-pane {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .section-pane.active {
            display: flex;
        }
        .preview {
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: hidden;
            height: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .lead {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }
        .panel-column .btn {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 999px;
            padding: 12px 16px;
            font-weight: 400;
            cursor: pointer;
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--gold), #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .group {
            margin-bottom: 14px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .group h2 {
            font-size: 1rem;
            margin-bottom: 14px;
            color: var(--gold);
            font-weight: 400;
        }
        .group.collapsed .group-body {
            display: none;
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .group-header h2 {
            margin: 0;
        }
        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }
        .field label {
            font-size: 0.75rem;
            color: var(--muted);
        }
        input, textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(6, 11, 24, 0.88);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        .array-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .array-entry {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .array-entry-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .array-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
        }
        .btn.mini {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 999px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: white;
        }
        .panel-section {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }
        .preview-column {
            position: relative;
            background: transparent;
            border-radius: 0;
            overflow: hidden;
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            padding: 12px 4px;
            background: rgba(4,5,11,0.95);
            border-radius: 0;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .menu-column::before {
            display: none;
        }
        .menu-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .menu-controls .btn {
            width: 100%;
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            padding: 12px 16px;
            font-weight: 400;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .menu-controls .btn.primary {
            background: linear-gradient(135deg, #d2a54c, #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .panel-column::-webkit-scrollbar,
        .menu-column::-webkit-scrollbar,
        .section-pane::-webkit-scrollbar {
            width: 8px;
        }
        .panel-column::-webkit-scrollbar-track,
        .menu-column::-webkit-scrollbar-track,
        .section-pane::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .panel-column::-webkit-scrollbar-thumb,
        .menu-column::-webkit-scrollbar-thumb,
        .section-pane::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(210,175,60,0.6), rgba(210,175,60,0.2));
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .menu-column::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(210,175,60,0.25);
            border-radius: 999px;
            pointer-events: none;
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        .side-menu button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .side-menu button.active {
            color: var(--text);
            font-weight: 700;
        }
        .hint {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.6;
        }
        .image-field-tools {
            margin-top: 8px;
            display: grid;
            gap: 8px;
        }
        .image-preview {
            width: 100%;
            min-height: 90px;
            border: 1px dashed rgba(255,255,255,0.16);
            border-radius: 12px;
            background: rgba(4, 10, 20, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .image-preview img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            display: block;
        }
        .image-preview-empty {
            color: var(--muted);
            font-size: 0.74rem;
            text-align: center;
            padding: 10px;
        }
        .image-field-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .image-picker-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 14, 0.72);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .image-picker-modal.open {
            display: flex;
        }
        .image-picker-panel {
            width: min(760px, 100%);
            max-height: min(74vh, 620px);
            background: linear-gradient(180deg, rgba(10, 18, 36, 0.96) 0%, rgba(8, 15, 30, 0.98) 100%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 14px;
            padding: 10px 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .image-picker-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .image-picker-head strong {
            font-size: 0.98rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .image-picker-panel .btn {
            padding: 5px 10px;
            font-size: 0.76rem;
            border-radius: 10px;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0.01em;
        }
        .image-picker-grid {
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
            gap: 8px;
            padding-right: 4px;
        }
        .image-picker-item {
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%);
            border-radius: 9px;
            padding: 5px;
            cursor: pointer;
            display: grid;
            gap: 5px;
        }
        .image-picker-item img {
            width: 100%;
            height: 66px;
            object-fit: cover;
            border-radius: 7px;
        }
        .image-picker-item span {
            font-size: 0.63rem;
            color: var(--muted);
            line-height: 1.25;
            overflow-wrap: anywhere;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.5em;
        }
        .library-item-actions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 4px;
        }
        .library-item-actions .btn {
            min-width: 0;
            padding: 4px 6px;
            font-size: 0.68rem;
            border-radius: 8px;
            font-weight: 500;
        }
        .icon-btn {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-size: 0.82rem;
            padding: 5px 0;
        }
        .upload-progress {
            margin-top: 6px;
            font-size: 0.72rem;
            color: var(--muted);
            min-height: 1.2em;
            letter-spacing: 0.01em;
        }
        .crop-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 14, 0.74);
            z-index: 10030;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .crop-modal.open {
            display: flex;
        }
        .crop-panel {
            width: min(640px, 100%);
            background: rgba(10, 18, 36, 0.98);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 14px;
            display: grid;
            gap: 10px;
        }
        .crop-panel canvas {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.4);
        }
        .crop-controls {
            display: grid;
            gap: 8px;
        }
        .crop-control-row {
            display: grid;
            grid-template-columns: 80px 1fr;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.8rem;
        }
        .app-toast-stack {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10020;
            display: grid;
            gap: 8px;
            width: min(360px, calc(100vw - 32px));
        }
        .app-toast {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(8, 16, 32, 0.95);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.82rem;
            line-height: 1.45;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        .app-toast.success { border-color: rgba(76, 210, 120, 0.5); }
        .app-toast.warning { border-color: rgba(210, 165, 76, 0.5); }
        .app-toast.error { border-color: rgba(255, 99, 99, 0.55); }
        .app-dialog-backdrop {
            position: fixed;
            inset: 0;
            z-index: 10010;
            background: rgba(3, 7, 14, 0.74);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app-dialog-backdrop.open {
            display: flex;
        }
        .app-dialog {
            width: min(520px, 100%);
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(10, 18, 36, 0.98);
            border-radius: 16px;
            padding: 14px;
            display: grid;
            gap: 10px;
        }
        .app-dialog h3 {
            font-size: 1rem;
            margin: 0;
        }
        .app-dialog p {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
            white-space: pre-wrap;
        }
        .app-dialog input {
            width: 100%;
        }
        .app-dialog-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }
        @media (max-width: 1100px) {
            .wrap { grid-template-columns: 1fr; }
            .panel { position: static; max-height: none; }
            iframe { height: 75vh; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="preview-column panel-section">
            <section class="preview">
                <iframe src="./index.html" id="previewFrame" title="Website preview"></iframe>
            </section>
        </div>
        <div class="panel-column">
            <h1>Tooryan Admin <span id="buildVersion" style="font-size:0.5em; color:var(--muted); font-weight:400;">v...</span> <span id="buildStatus" style="font-size:0.35em; font-weight:600; letter-spacing:0.04em; padding:3px 8px; border-radius:999px; background:rgba(255,255,255,0.1); color:var(--muted); vertical-align:middle;">Checking...</span></h1>
            <div class="hint" style="margin-bottom:18px;" id="pathInfo">
                <p>Admin HTML: <strong id="adminPath">Loading...</strong></p>
                <p>Data JSON: <strong id="dataPath">Loading...</strong></p>
                <p>Site images: <strong id="imagesPath">Loading...</strong></p>
            </div>
            <form id="adminForm">
                <div id="sectionPanels">
                    <div id="imageManagerPane" class="section-pane" data-section="image-manager">
                        <section class="group">
                            <h2>Image Manager</h2>
                            <div class="field">
                                <label>Upload New Image(s)</label>
                                <input type="file" id="imageUpload" accept="image/*" multiple style="padding:8px;">
                                <button type="button" class="btn" id="uploadBtn" style="margin-top:8px; width:100%;">Upload to Server</button>
                                <div id="uploadProgress" class="upload-progress"></div>
                            </div>
                            <div class="field" style="margin-top:15px;">
                                <label>Browse Uploaded Images</label>
                                <div style="margin-bottom:8px; padding:10px; background:rgba(0,0,0,0.28); border-radius:10px; border:1px solid rgba(255,255,255,0.07);">
                                    <p style="margin-bottom:6px; font-weight:500;">Images in folder:</p>
                                    <div id="imagesList" style="font-size:0.8rem; color:var(--muted); max-height:120px; overflow:auto; scrollbar-gutter:stable both-edges; padding-right:6px; white-space:nowrap;">
                                        <p>Scanning...</p>
                                    </div>
                                </div>
                                <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
                                    <button type="button" class="btn mini" id="refreshImagesBtn">Refresh Images Folder</button>
                                    <button type="button" class="btn mini" id="manageLibraryBtn">Manage Library</button>
                                </div>
                                <div id="imageGallery" style="display:flex; flex-wrap:wrap; gap:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; border: 1px solid rgba(255,255,255,0.08);">
                                    <p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>
                                </div>
                                <p style="color:var(--muted); font-size:0.75rem; margin-top:5px;">Click an image to copy its URL, then paste it into any image field below.</p>
                            </div>
                        </section>
                    </div>
                    <div id="dynamicSectionPanels"></div>
                </div>
            </form>
        </div>
        <div class="menu-column">
            <div class="menu-controls">
                <button class="btn primary" id="saveBtn">Save</button>
                <button class="btn" id="resetBtn">Reset</button>
                <button class="btn" id="refreshBtn">Refresh</button>
                <button class="btn" id="expandAllBtn">Expand</button>
                <button class="btn" id="collapseAllBtn">Collapse</button>
            </div>
            <div class="side-menu" id="sideMenu"></div>
        </div>
    </div>
    <script src="./site-config.js"></script>
    <script>
        let imagesBasePath = './images/';

        function normalizeImageNames(items) {
            if (!Array.isArray(items)) return [];
            return items
                .map((img) => String(img || '').replace('./images/', '').trim())
                .filter(Boolean);
        }

        function setBuildStatus(label, tone = 'muted') {
            const statusEl = document.getElementById('buildStatus');
            if (!statusEl) return;
            const tones = {
                ok: { background: 'rgba(76, 210, 120, 0.18)', color: '#9ff2be' },
                pending: { background: 'rgba(210, 165, 76, 0.2)', color: '#f2cf86' },
                warn: { background: 'rgba(255, 99, 99, 0.2)', color: '#ffadad' },
                muted: { background: 'rgba(255,255,255,0.1)', color: 'var(--muted)' }
            };
            const style = tones[tone] || tones.muted;
            statusEl.textContent = label;
            statusEl.style.background = style.background;
            statusEl.style.color = style.color;
        }

        async function loadImagesFolderList() {
            const imagesListEl = document.getElementById('imagesList');
            if (!imagesListEl) return;
            imagesListEl.innerHTML = '<p>Scanning...</p>';
            const cacheBuster = `t=${Date.now()}`;

            try {
                const res = await fetch(`/api/list_images?${cacheBuster}`, { cache: 'no-store' });
                const data = await res.json();
                const images = normalizeImageNames(data?.images);
                if (images.length > 0) {
                    imagesListEl.innerHTML = images.map((img) => `<div style="margin-bottom:4px;">• ${img}</div>`).join('');
                    return;
                }
                imagesListEl.innerHTML = '<p style="color:var(--muted);">No images found</p>';
            } catch (err) {
                try {
                    const res = await fetch(`${imagesBasePath}manifest.json?${cacheBuster}`, { cache: 'no-store' });
                    const images = normalizeImageNames(await res.json());
                    if (images.length > 0) {
                        imagesListEl.innerHTML = images.map((img) => `<div style="margin-bottom:4px;">• ${img}</div>`).join('');
                    } else {
                        imagesListEl.innerHTML = '<p style="color:var(--muted);">No images found</p>';
                    }
                } catch (manifestErr) {
                    imagesListEl.innerHTML = '<p style="color:var(--muted);">Unable to list images (manifest not found)</p>';
                    console.log('Image listing error:', err, manifestErr);
                }
            }
        }

        // Dynamically detect and display current paths
        (function() {
            const currentURL = window.location.href;
            const origin = window.location.origin;
            const pathname = window.location.pathname;
            const baseDir = pathname.substring(0, pathname.lastIndexOf('/') + 1);
            
            const adminPath = currentURL;
            const dataPath = origin + baseDir + 'data.json';
            const imagesPath = origin + baseDir + 'images/';
            imagesBasePath = imagesPath;
            
            document.getElementById('adminPath').textContent = adminPath;
            document.getElementById('dataPath').textContent = dataPath;
            document.getElementById('imagesPath').textContent = imagesPath;
            
            // Fetch and display build version + deploy status
            setBuildStatus('Checking...', 'muted');

        function sanitizeFileName(name) {
            return String(name || '')
                .trim()
                .replace(/[^a-zA-Z0-9._-]/g, '_')
                .replace(/^\.+/, '');
        }

        function splitFileNameParts(fileName) {
            const safe = sanitizeFileName(fileName);
            const idx = safe.lastIndexOf('.');
            if (idx <= 0) return { base: safe, ext: '' };
            return { base: safe.slice(0, idx), ext: safe.slice(idx) };
        }

        function uniqueFileName(fileName, existingNameSet) {
            const { base, ext } = splitFileNameParts(fileName);
            let candidate = `${base}_${Date.now()}${ext}`;
            let counter = 1;
            while (existingNameSet.has(candidate)) {
                candidate = `${base}_${Date.now()}_${counter}${ext}`;
                counter += 1;
            }
            return candidate;
        }

        function drawCropPreview() {
            if (!cropCanvas || !cropSourceImage) return;
            const ctx = cropCanvas.getContext('2d');
            const cw = cropCanvas.width;
            const ch = cropCanvas.height;
            const zoom = Number(cropZoomInput.value || 1);
            const offsetX = Number(cropXInput.value || 0) / 100;
            const offsetY = Number(cropYInput.value || 0) / 100;

            ctx.clearRect(0, 0, cw, ch);
            ctx.fillStyle = '#050a14';
            ctx.fillRect(0, 0, cw, ch);

            const baseScale = Math.max(cw / cropSourceImage.width, ch / cropSourceImage.height);
            const drawW = cropSourceImage.width * baseScale * zoom;
            const drawH = cropSourceImage.height * baseScale * zoom;
            const maxShiftX = Math.max(0, (drawW - cw) / 2);
            const maxShiftY = Math.max(0, (drawH - ch) / 2);
            const dx = (cw - drawW) / 2 + offsetX * maxShiftX;
            const dy = (ch - drawH) / 2 + offsetY * maxShiftY;
            ctx.drawImage(cropSourceImage, dx, dy, drawW, drawH);
        }

            if (!blob) {

            const croppedFile = new File([blob], cropTargetFileName, { type: mimeType });
            const result = await uploadFilesBatch([croppedFile], null, { forceName: cropTargetFileName, forceOverwrite: true, skipConflictPrompt: true });
            if (result.uploadedUrls.length > 0) {

        async function syncGitHubManifest(token) {
            const githubHeaders = {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            };
            const listRes = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/images?ref=main', {
                headers: githubHeaders
            });
            if (!listRes.ok) {
                throw new Error('Unable to list images for manifest sync.');
            }
            const items = await listRes.json();
            const imageNames = (Array.isArray(items) ? items : [])
                .filter((item) => item && item.type === 'file')
                .map((item) => String(item.name || ''))
                .filter((name) => /\.(png|jpe?g|gif|webp|svg|avif)$/i.test(name))
                .sort((a, b) => a.localeCompare(b));

            const manifestResponse = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/images/manifest.json?ref=main', {
                headers: githubHeaders
            });

            let manifestSha = null;
            if (manifestResponse.ok) {
                const manifestData = await manifestResponse.json();
                manifestSha = manifestData.sha || null;
            }

            const manifestBody = {
                message: 'Sync image manifest',
                content: btoa(JSON.stringify(imageNames, null, 2) + '\n'),
                branch: 'main'
            };
            if (manifestSha) manifestBody.sha = manifestSha;
            const updateRes = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/images/manifest.json', {
                method: 'PUT',
                headers: githubHeaders,
                body: JSON.stringify(manifestBody)
            });
            if (!updateRes.ok) {
                throw new Error('Failed to update image manifest on GitHub.');
            }
        }

        async function deleteImageViaGitHub(fileName) {
            const token = await getGitHubToken();
            if (!token) throw new Error('GitHub token is required to delete images.');
            const githubHeaders = {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            };
            const encodedPath = `images/${encodeURIComponent(fileName)}`;
            const existingRes = await fetch(`https://api.github.com/repos/TooryanStudios/tooryan-website/contents/${encodedPath}?ref=main`, {
                headers: githubHeaders
            });
            if (!existingRes.ok) throw new Error('Image not found in GitHub repository.');
            const existing = await existingRes.json();
            const delRes = await fetch(`https://api.github.com/repos/TooryanStudios/tooryan-website/contents/${encodedPath}`, {
                method: 'DELETE',
                headers: githubHeaders,
                body: JSON.stringify({
                    message: `Delete image: ${fileName}`,
                    sha: existing.sha,
                    branch: 'main'
                })
            });
            if (!delRes.ok) {
                const errorText = await delRes.text();
                throw new Error(errorText);
            }
            await syncGitHubManifest(token);
            return true;
        }

        async function deleteImageByName(fileName) {
            try {

                return true;
            } catch (localErr) {
                console.log('Local delete unavailable, using GitHub fallback:', localErr?.message || localErr);
                await deleteImageViaGitHub(fileName);
                return true;
            }
        }

            const card = document.createElement('div');

            });

            const updateTitle = () => {
                const titleField = card.querySelector(`[data-array-field="${config.titleKey}"]`);
                title.textContent = titleField && titleField.value ? titleField.value : `${config.singular}`;
            };

            config.fields.forEach((field) => {
                const fieldWrapper = document.createElement('div');
                fieldWrapper.className = 'field';
                const label = document.createElement('label');
                label.textContent = field.label;
                const input = field.type === 'textarea' ? document.createElement('textarea') : document.createElement('input');
                if (input.tagName === 'INPUT') {
                    input.type = field.type === 'textarea' ? 'text' : field.type;
                }
                input.dataset.arrayField = field.key;
                input.value = entryData[field.key] || '';
                fieldWrapper.appendChild(label);
                fieldWrapper.appendChild(input);
                attachAutoFillListeners(input, (value) => {
                    if (field.key === config.titleKey) {

                });
                if (input.tagName === 'INPUT' && isImageField(field.key, field.label)) {

                card.appendChild(fieldWrapper);
            });

            updateTitle();

        function encodeBase64Utf8(value) {
            const bytes = new TextEncoder().encode(String(value || ''));
            let binary = '';
            bytes.forEach((b) => {
                binary += String.fromCharCode(b);
            });
            return btoa(binary);
        }

        async function saveContentViaGitHub(contentPayload, token) {
            const githubHeaders = {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            };

            const existingRes = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/data.json?ref=main', {
                headers: githubHeaders
            });
            let sha = null;
            if (existingRes.ok) {
                const existingData = await existingRes.json();
                sha = existingData.sha || null;
            }

            const payloadText = JSON.stringify(contentPayload, null, 2) + '\n';
            const body = {
                message: 'Update data.json from admin panel',
                content: encodeBase64Utf8(payloadText),
                branch: 'main'
            };
            if (sha) body.sha = sha;

            const updateRes = await fetch('https://api.github.com/repos/TooryanStudios/tooryan-website/contents/data.json', {
                method: 'PUT',
                headers: githubHeaders,
                body: JSON.stringify(body)
            });
            if (!updateRes.ok) {
                const errorText = await updateRes.text();
                throw new Error(errorText || 'Failed to publish data.json to GitHub.');
            }
            return true;
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(String(e.target.result || '').split(',')[1] || '');
                reader.onerror = () => reject(new Error('Failed to read file.'));
                reader.readAsDataURL(file);
            });
        }

        async function uploadSingleViaLocal(file, uploadOptions = {}) {
            const formData = new FormData();
            formData.append('image', file);
            if (uploadOptions.desiredName) {
                formData.append('desiredName', uploadOptions.desiredName);
            }
            if (uploadOptions.overwrite) {
                formData.append('overwrite', 'true');
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });
                const data = await res.json();
                if (data.status !== 'success' || !data.url) {
                    throw new Error(data.message || 'Local upload returned unexpected response.');
                }
                return data.url;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function uploadSingleViaGitHub(file, token, uploadOptions = {}) {
            const githubHeaders = {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            };
            const base64Content = await readFileAsBase64(file);
            const cleanName = sanitizeFileName(file.name);
            const filename = uploadOptions.desiredName || cleanName;
            const overwrite = Boolean(uploadOptions.overwrite);

            const imagePath = `images/${filename}`;
            let existingImageSha = null;
            const existingImageResponse = await fetch(`https://api.github.com/repos/TooryanStudios/tooryan-website/contents/${imagePath}?ref=main`, {
                headers: githubHeaders
            });
            if (existingImageResponse.ok) {
                const existingImageData = await existingImageResponse.json();
                existingImageSha = existingImageData.sha || null;
                if (!overwrite) {
                    throw new Error(`Image already exists: ${filename}`);
                }
            }

            const uploadBody = {
                message: overwrite ? `Override image: ${filename}` : `Upload image: ${filename}`,
                content: base64Content,
                branch: 'main'
            };
            if (existingImageSha) {
                uploadBody.sha = existingImageSha;
            }
            const uploadResponse = await fetch(`https://api.github.com/repos/TooryanStudios/tooryan-website/contents/${imagePath}`, {
                method: 'PUT',
                headers: githubHeaders,
                body: JSON.stringify(uploadBody)
            });

            if (!uploadResponse.ok) {
                const uploadError = await uploadResponse.text();
                throw new Error(uploadError);
            }

            return `./images/${filename}`;
        }

        async function uploadFilesBatch(files, onProgress, options = {}) {
            let useGitHub = false;
            let githubToken = null;
            const uploadedUrls = [];
            const failedFiles = [];
            const existingNameSet = new Set(await fetchAvailableImageNames());

            for (let i = 0; i < files.length; i += 1) {
                const file = files[i];
                if (typeof onProgress === 'function') {
                    onProgress(i + 1, files.length, file);
                }

                try {
                    const originalName = sanitizeFileName(file.name);
                    if (!originalName) {
                        failedFiles.push(`${file.name}: Invalid filename.`);
                        continue;
                    }

                    let desiredName = options.forceName ? sanitizeFileName(options.forceName) : originalName;
                    let overwrite = Boolean(options.forceOverwrite);
                    if (existingNameSet.has(desiredName) && !options.skipConflictPrompt && !options.forceOverwrite) {
                        const overwriteChoice = await showDialog({
                            title: 'Image Already Exists',
                            message: `An image named "${desiredName}" already exists.\nWhat would you like to do?`,
                            buttons: [
                                { id: 'cancel', label: 'Skip', className: 'btn mini' },
                                { id: 'keep-both', label: 'Keep Both', className: 'btn mini' },
                                { id: 'override', label: 'Override', className: 'btn mini' }
                            ]
                        });

                        if (overwriteChoice.action === 'cancel') {
                            failedFiles.push(`${file.name}: Skipped by user.`);
                            continue;
                        }
                        if (overwriteChoice.action === 'override') {
                            overwrite = true;
                            desiredName = options.forceName ? sanitizeFileName(options.forceName) : originalName;
                        } else {
                            desiredName = uniqueFileName(options.forceName ? sanitizeFileName(options.forceName) : originalName, existingNameSet);
                        }
                    }

                    let url;
                    if (!useGitHub) {
                        try {
                            url = await uploadSingleViaLocal(file, { desiredName, overwrite });
                        } catch (localErr) {
                            useGitHub = true;
                            console.log('Local upload unavailable, switching to GitHub fallback:', localErr?.message || localErr);
                        }
                    }

                    if (useGitHub) {
                        if (!githubToken) {
                            githubToken = await getGitHubToken();
                            if (!githubToken) throw new Error('GitHub token is required to continue uploads.');
                        }
                        url = await uploadSingleViaGitHub(file, githubToken, { desiredName, overwrite });
                    }

                    existingNameSet.add(desiredName);
                    uploadedUrls.push(url);
                } catch (fileErr) {
                    const errorMessage = fileErr?.message || 'Upload failed';
                    failedFiles.push(`${file.name}: ${errorMessage}`);
                    if (String(errorMessage).includes('GitHub token is required')) {
                        break;
                    }
                    if (String(errorMessage).includes('Bad credentials')) {
                        localStorage.removeItem('github_token');
                        githubToken = null;
                    }
                }
            }

            if (useGitHub && uploadedUrls.length > 0 && githubToken) {
                try {
                    await syncGitHubManifest(githubToken);
                } catch (manifestErr) {
                    failedFiles.push(`Manifest sync warning: ${manifestErr?.message || manifestErr}`);
                }
            }

            return { uploadedUrls, failedFiles, usedGitHub: useGitHub };
        }

        document.getElementById('uploadBtn').addEventListener('click', async (event) => {
            event.preventDefault();
            const fileInput = document.getElementById('imageUpload');
            const files = Array.from(fileInput.files || []);
            if (files.length === 0) {
                showToast('Select one or more images first.', 'warning');
                return;
            }

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            setUploadProgress(`Uploading 0/${files.length}...`);

            try {
                const result = await uploadFilesBatch(files, (index, total) => {
                    btn.textContent = `Uploading ${index}/${total}...`;
                    setUploadProgress(`Uploading ${index}/${total}...`);
                });
                const uploadedUrls = result.uploadedUrls;
                const failedFiles = result.failedFiles;

                if (uploadedUrls.length > 0) {
                    const clipboardText = uploadedUrls.join('\n');
                    navigator.clipboard.writeText(clipboardText);
                    if (autoFillTarget && uploadedUrls.length === 1) {
                        autoFillTarget.value = uploadedUrls[0];
                    }
                    fileInput.value = '';
                    await new Promise(resolve => setTimeout(resolve, 500));
                    await Promise.all([loadGallery(), loadImagesFolderList(), refreshLibraryManager()]);

                    let message = `${uploadedUrls.length} image(s) uploaded successfully. URL list copied to clipboard.`;
                    if (result.usedGitHub) {
                        message += '\n\nDeploy will publish GitHub uploads in ~1-2 minutes.';
                    }
                    if (failedFiles.length > 0) {
                        message += `\n\n${failedFiles.length} failed:\n- ${failedFiles.join('\n- ')}`;
                    }
                    await showDialog({
                        title: 'Upload Complete',
                        message,
                        buttons: [{ id: 'ok', label: 'OK', className: 'btn mini' }]
                    });
                    setUploadProgress('Upload complete.');
                } else {
                    await showDialog({
                        title: 'Upload Result',
                        message: `No images were uploaded.\n\n${failedFiles.join('\n') || 'Unknown error.'}`,
                        buttons: [{ id: 'ok', label: 'OK', className: 'btn mini' }]
                    });
                    setUploadProgress('Upload finished with no successful files.');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload to Server';
                window.setTimeout(() => setUploadProgress(''), 2500);
            }
        });
