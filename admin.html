<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooryan Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07101f;
            --panel: #101a31;
            --panel-2: #14203c;
            --border: rgba(255,255,255,0.1);
            --text: #eef3ff;
            --muted: #98a6c7;
            --gold: #d2a54c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #07101f 0%, #091426 100%);
            color: var(--text);
        }
        .wrap {
            width: min(1380px, calc(100% - 32px));
            margin: 24px auto;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;
            align-items: start;
        }
        .panel {
            background: rgba(16, 26, 49, 0.92);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(14px);
            position: sticky;
            top: 24px;
            max-height: calc(100vh - 48px);
            overflow: auto;
        }
        .preview {
            background: rgba(16, 26, 49, 0.72);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            min-height: calc(100vh - 48px);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .lead {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 22px;
        }
        .btn {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 999px;
            padding: 12px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--gold), #f2cf86);
            color: #1f1608;
            border-color: transparent;
        }
        .group {
            margin-bottom: 18px;
            padding: 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .group h2 {
            font-size: 1rem;
            margin-bottom: 14px;
            color: var(--gold);
        }
        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }
        .field label {
            font-size: 0.86rem;
            color: var(--muted);
        }
        input, textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(6, 11, 24, 0.88);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 14px;
            font: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        iframe {
            width: 100%;
            height: calc(100vh - 48px);
            border: 0;
            background: white;
        }
        .hint {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.6;
        }
        @media (max-width: 1100px) {
            .wrap { grid-template-columns: 1fr; }
            .panel { position: static; max-height: none; }
            iframe { height: 75vh; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <aside class="panel">
            <h1>Tooryan Admin</h1>
            <p class="lead">Edit text and image URLs, save to server, and preview the website instantly.</p>
            <div class="toolbar">
                <button class="btn primary" id="saveBtn">Save changes</button>
                <button class="btn" id="resetBtn">Reset defaults</button>
                <button class="btn" id="refreshBtn">Refresh preview</button>
            </div>
            
            <!-- Image Manager Section -->
            <section class="group">
                <h2>Image Manager</h2>
                <div class="field">
                    <label>Upload New Image</label>
                    <input type="file" id="imageUpload" accept="image/*" style="padding:8px;">
                    <button class="btn" id="uploadBtn" style="margin-top:8px; width:100%;">Upload to Server</button>
                </div>
                <div class="field" style="margin-top:15px;">
                    <label>Browse Uploaded Images</label>
                    <div id="imageGallery" style="display:flex; flex-wrap:wrap; gap:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; border: 1px solid rgba(255,255,255,0.08);">
                        <p style="color:var(--muted); font-size:0.8rem;">Loading images...</p>
                    </div>
                    <p style="color:var(--muted); font-size:0.75rem; margin-top:5px;">Click an image to copy its URL, then paste it into any image field below.</p>
                </div>
            </section>

            <form id="adminForm"></form>
            <p class="hint">Changes are saved directly to data.json on the server.</p>
        </aside>
        <section class="preview">
            <iframe src="./index.html" id="previewFrame" title="Website preview"></iframe>
        </section>
    </div>
    <script src="./site-config.js"></script>
    <script>
        const groups = {
            Hero: ['heroEyebrow', 'heroTitleHtml', 'heroDescription', 'heroImage', 'heroCard1Label', 'heroCard1Title', 'heroCard1Text', 'heroCard2Label', 'heroCard2Title', 'heroCard2Text', 'heroCard3Label', 'heroCard3Title', 'heroCard3Text'],
            Featured: ['featuredHeading', 'featuredText', 'featuredMainBadge', 'featuredMainLabel', 'featuredMainTitle', 'featuredMainImage', 'featuredStat1Title', 'featuredStat1Text', 'featuredStat2Title', 'featuredStat2Text', 'featuredStat3Title', 'featuredStat3Text', 'side1Title', 'side1Text', 'side1Image', 'side2Title', 'side2Text', 'side2Image'],
            Services: ['service1Title', 'service1Text', 'service2Title', 'service2Text', 'service3Title', 'service3Text'],
            Vision: ['visionTitle', 'visionText', 'floatingImg1', 'floatingImg2', 'floatingImg3', 'quote'],
            Contact: ['contactTitle', 'contactText', 'phone', 'email', 'location']
        };

        let content = {};
        const form = document.getElementById('adminForm');
        const previewFrame = document.getElementById('previewFrame');

        function isLongField(key) {
            return key.toLowerCase().includes('text') || key.toLowerCase().includes('description') || key.toLowerCase().includes('html') || key === 'quote';
        }

        function prettify(key) {
            return key.replace(/([A-Z])/g, ' $1').replace(/^./, (char) => char.toUpperCase());
        }

        function buildForm() {
            form.innerHTML = '';
            Object.entries(groups).forEach(([title, keys]) => {
                const group = document.createElement('section');
                group.className = 'group';
                const heading = document.createElement('h2');
                heading.textContent = title;
                group.appendChild(heading);

                keys.forEach((key) => {
                    const field = document.createElement('div');
                    field.className = 'field';
                    const label = document.createElement('label');
                    label.setAttribute('for', key);
                    label.textContent = prettify(key);
                    field.appendChild(label);

                    let input;
                    if (isLongField(key)) {
                        input = document.createElement('textarea');
                    } else {
                        input = document.createElement('input');
                        input.type = 'text';
                    }
                    input.id = key;
                    input.name = key;
                    input.value = content[key] || '';
                    field.appendChild(input);
                    group.appendChild(field);
                });

                form.appendChild(group);
            });
        }

        function collectForm() {
            const data = {};
            new FormData(form).forEach((value, key) => {
                data[key] = value;
            });
            return data;
        }

        function refreshPreview() {
            previewFrame.contentWindow.location.reload();
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            document.getElementById('saveBtn').textContent = 'Saving...';
            await window.saveTooryanContent(collectForm());
            document.getElementById('saveBtn').textContent = 'Save changes';
            refreshPreview();
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            if(confirm('Are you sure you want to reset to default content?')) {
                await window.resetTooryanContent();
                content = await window.getTooryanContent();
                buildForm();
                refreshPreview();
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', refreshPreview);

        // --- Image Manager Logic ---
        async function loadGallery() {
            const gallery = document.getElementById('imageGallery');
            try {
                const res = await fetch('api/list_images.php');
                const data = await res.json();
                if(data.status === 'success') {
                    gallery.innerHTML = '';
                    if(data.images.length === 0) {
                        gallery.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">No images uploaded yet.</p>';
                        return;
                    }
                    data.images.forEach(imgUrl => {
                        const img = document.createElement('img');
                        img.src = imgUrl;
                        img.style.width = '60px';
                        img.style.height = '60px';
                        img.style.objectFit = 'cover';
                        img.style.borderRadius = '5px';
                        img.style.cursor = 'pointer';
                        img.title = 'Click to copy URL';
                        img.onclick = () => {
                            navigator.clipboard.writeText(imgUrl).then(() => {
                                alert('Copied URL: ' + imgUrl);
                            });
                        };
                        gallery.appendChild(img);
                    });
                }
            } catch(e) {
                gallery.innerHTML = '<p style="color:red; font-size:0.8rem;">Failed to load images (Requires PHP server)</p>';
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('imageUpload');
            if(!fileInput.files[0]) {
                alert('Please select an image first.');
                return;
            }
            
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            
            const btn = document.getElementById('uploadBtn');
            btn.textContent = 'Uploading...';
            
            try {
                const res = await fetch('api/upload.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(data.status === 'success') {
                    alert('Upload successful! URL copied to clipboard.');
                    navigator.clipboard.writeText(data.url);
                    fileInput.value = '';
                    loadGallery();
                } else {
                    alert('Upload failed: ' + data.message);
                }
            } catch(e) {
                alert('Upload failed. Ensure you are running on a PHP server.');
            }
            
            btn.textContent = 'Upload to Server';
        });

        // Initialize Async
        async function initAdmin() {
            content = await window.getTooryanContent();
            buildForm();
            loadGallery();
        }
        
        initAdmin();

    </script>
</body>
</html>
