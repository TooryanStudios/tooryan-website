<!DOCTYPE html>
<html lang="en" class="lenis lenis-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooryan Studios | Digital Art & Animation</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GSAP & Lenis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

    <!-- Site Configuration -->
    <script src="site-config.js"></script>

    <style>
        :root {
            --bg: #030303;
            --text: #ffffff;
            --accent: #d4af37; /* Gold */
            --muted: #888888;
            --font-display: 'Syncopate', sans-serif;
            --font-sans: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html.lenis {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #050505; 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b5952f; 
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) #050505;
        }

        /* Cinematic Grain Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            margin-left: 2rem;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            mix-blend-mode: difference;
        }
        .cursor.active {
            width: 60px;
            height: 60px;
            background-color: rgba(212, 175, 55, 0.2);
        }

        /* Typography */
        h1, h2, h3, h4 {
            font-family: var(--font-display);
            text-transform: uppercase;
            font-weight: 700;
        }
        .stroke {
            color: transparent;
            -webkit-text-stroke: 1px var(--text);
        }

        /* --- SECTIONS --- */
        section {
            position: relative;
            width: 100vw;
        }

        /* 1. HERO - Full screen parallax */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 120%;
            object-fit: cover;
            opacity: 0.4;
            z-index: 0;
            will-change: transform;
        }
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hero-eyebrow {
            font-family: var(--font-sans);
            color: var(--accent);
            letter-spacing: 4px;
            margin-bottom: 2rem;
            font-size: 1rem;
            text-transform: uppercase;
        }
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            line-height: 1.1;
            margin-bottom: 2rem;
            max-width: 90vw;
        }
        .hero-desc {
            font-family: var(--font-sans);
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            max-width: 600px;
            color: var(--muted);
            line-height: 1.6;
        }

        /* 2. VISION - Scrubbing text reveal */
        .vision {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }
        
        /* Floating Parallax Objects */
        .floating-obj {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            will-change: transform;
            border-radius: 50%;
            object-fit: cover;
            mix-blend-mode: screen;
        }
        .float-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            opacity: 0.7;
            transform: rotate(-15deg);
        }
        .float-2 {
            width: 450px;
            height: 450px;
            bottom: -10%;
            right: -5%;
            opacity: 0.4;
            transform: rotate(25deg);
            filter: blur(5px); /* Creates depth of field */
        }
        .float-3 {
            width: 200px;
            height: 200px;
            top: 40%;
            right: 15%;
            opacity: 0.9;
            transform: rotate(10deg);
        }

        .vision-text {
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            line-height: 1.2;
            max-width: 80vw;
            text-align: center;
            font-family: var(--font-sans);
            font-weight: 500;
        }
        .vision-text span {
            opacity: 0.2;
            transition: opacity 0.1s;
        }
        .vision-sub {
            margin-top: 3rem;
            font-size: 1.2rem;
            color: var(--accent);
            text-align: center;
            font-family: var(--font-body);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 3. HORIZONTAL SCROLL - Featured Works */
        .horizontal-wrapper {
            position: relative;
            background: #050505;
        }
        .horizontal-sticky {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .horizontal-container {
            display: flex;
            gap: 10vw;
            padding: 0 10vw;
            height: 70vh;
            align-items: center;
            will-change: transform;
            width: max-content;
        }
        .work-card {
            width: 60vw;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }
        .work-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .work-card:hover img {
            transform: scale(1.05);
        }
        .work-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 3rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: #fff;
        }
        .work-info h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .work-info p {
            font-family: var(--font-sans);
            color: var(--muted);
            font-size: 1.1rem;
        }
        .h-title-section {
            width: 40vw;
            flex-shrink: 0;
            padding-right: 5vw;
        }
        .h-title-section h2 {
            font-size: 2.8rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }
        .h-title-section p {
            color: var(--muted);
            font-family: var(--font-sans);
            font-size: 1.2rem;
        }

        /* 4. SERVICES - Stacking Cards */
        .services {
            padding: 10rem 5vw;
            background: #030303;
            position: relative;
            z-index: 1;
        }
        .services-header {
            text-align: center;
            margin-bottom: 8rem;
        }
        .services-header h2 {
            font-size: 3.5rem;
            color: transparent;
            -webkit-text-stroke: 1px var(--accent);
        }
        .cards-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5vh;
            padding-bottom: 10vh;
        }
        .service-card {
            position: sticky;
            top: 20vh;
            width: 80vw;
            max-width: 1000px;
            height: 60vh;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform-origin: top center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .service-card h3 {
            font-size: 2.2rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        .service-card p {
            font-family: var(--font-sans);
            font-size: 1.5rem;
            color: var(--muted);
            max-width: 80%;
            line-height: 1.5;
        }
        .service-card:nth-child(1) { top: 15vh; z-index: 1; }
        .service-card:nth-child(2) { top: 20vh; z-index: 2; }
        .service-card:nth-child(3) { top: 25vh; z-index: 3; }

        /* 5. FOOTER - Massive Reveal */
        .footer {
            height: 100vh;
            background: #d4af37; /* Gold bg */
            color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10; /* Bring footer above the cards */
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }
        .footer-content {
            padding: 2rem;
        }
        .footer h2 {
            font-size: clamp(3rem, 8vw, 7rem);
            line-height: 1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-family: var(--font-display);
        }
        .footer p {
            font-family: var(--font-sans);
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .footer-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
        }
        .footer-links a {
            color: #000;
            text-decoration: none;
            font-size: 1.2rem;
            position: relative;
        }
        .footer-links a::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0; width: 0%; height: 2px;
            background: #000;
            transition: width 0.3s;
        }
        .footer-links a:hover::after {
            width: 100%;
        }

        /* Loading Screen */
        .loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent);
            font-family: var(--font-display);
            font-size: 2rem;
        }
        .loader-text {
            overflow: hidden;
        }
        .loader-text span {
            display: inline-block;
            transform: translateY(100%);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 1.5rem; }
            .horizontal-container { padding: 0 5vw; height: 60vh; }
            .h-title-section { width: 80vw; }
            .work-card { width: 85vw; }
            .service-card { padding: 2rem; }
            .service-card h3 { font-size: 2rem; }
            .service-card p { font-size: 1.1rem; max-width: 100%; }
            .cursor { display: none; }
        }
    </style>
</head>
<body>

    <!-- Cinematic Noise -->
    <div class="noise"></div>

    <!-- Custom Cursor -->
    <div class="cursor" id="custom-cursor"></div>

    <!-- Preloader -->
    <div class="loader" id="loader">
        <div class="loader-text"><span id="loader-span">TOORYAN STUDIOS</span></div>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="logo">TOORYAN</div>
        <div class="nav-links">
            <a href="admin.html" class="hover-target">Admin</a>
            <a href="mailto:tooryanart@gmail.com" class="hover-target" id="navEmail">Contact</a>
        </div>
    </nav>

    <!-- 1. HERO SECTION -->
    <section class="hero" id="hero-section">
        <img src="" alt="Hero Background" class="hero-bg" id="heroImage" data-speed="0.5">
        <div class="hero-content">
            <div class="hero-eyebrow" id="heroEyebrow"></div>
            <h1 class="hero-title" id="heroTitle"></h1>
            <p class="hero-desc" id="heroDescription"></p>
        </div>
    </section>

    <!-- 2. VISION (Text Scrub & 3D Objects) -->
    <section class="vision" id="vision-section">
        
        <!-- Floating 3D Objects -->
        <img src="" id="floatingImg1" class="floating-obj float-1" data-speed="0.8" alt="3D Object 1">
        <img src="" id="floatingImg2" class="floating-obj float-2" data-speed="-0.5" alt="3D Object 2">
        <img src="" id="floatingImg3" class="floating-obj float-3" data-speed="1.2" alt="3D Object 3">

        <div style="display:flex; flex-direction:column; align-items:center; position:relative; z-index:2;">
            <div class="vision-text" id="visionTitle"></div>
            <div class="vision-sub" id="visionText"></div>
        </div>
    </section>

    <!-- 3. HORIZONTAL WORKS -->
    <section class="horizontal-wrapper" id="works-wrapper">
        <div class="horizontal-sticky">
            <div class="horizontal-container" id="works-container">
                
                <div class="h-title-section">
                    <h2 id="featuredHeading"></h2>
                    <p id="featuredText"></p>
                </div>

                <div class="work-card hover-target">
                    <img id="featuredMainImage" src="" alt="Featured Work 1">
                    <div class="work-info">
                        <p id="featuredMainLabel" style="color:var(--accent); font-weight:bold; margin-bottom:10px;"></p>
                        <h3 id="featuredMainTitle"></h3>
                    </div>
                </div>

                <div class="work-card hover-target">
                    <img id="side1Image" src="" alt="Work 2">
                    <div class="work-info">
                        <h3 id="side1Title"></h3>
                        <p id="side1Text"></p>
                    </div>
                </div>

                <div class="work-card hover-target">
                    <img id="side2Image" src="" alt="Work 3">
                    <div class="work-info">
                        <h3 id="side2Title"></h3>
                        <p id="side2Text"></p>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- 4. SERVICES (Stacking Cards) -->
    <section class="services">
        <div class="services-header">
            <h2>EXPERTISE</h2>
        </div>
        <div class="cards-container">
            <div class="service-card hover-target card-1">
                <h3 id="service1Title"></h3>
                <p id="service1Text"></p>
            </div>
            <div class="service-card hover-target card-2">
                <h3 id="service2Title"></h3>
                <p id="service2Text"></p>
            </div>
            <div class="service-card hover-target card-3">
                <h3 id="service3Title"></h3>
                <p id="service3Text"></p>
            </div>
        </div>
    </section>

    <!-- 5. FOOTER -->
    <section class="footer" id="footer">
        <div class="footer-content">
            <h2 id="contactTitle"></h2>
            <p id="contactText"></p>
            <div class="footer-links">
                <a href="#" id="contactPhone" class="hover-target"></a>
                <a href="#" id="contactEmail" class="hover-target"></a>
                <span id="contactLocation" style="align-self:center; font-family:var(--font-sans)"></span>
            </div>
        </div>
    </section>


    <!-- SCRIPTS -->
    <script>
        async function initSite() {
            // --- 1. Load Content from site-config.js (Async now) ---
            const content = await window.getTooryanContent();
            
            // Map data to DOM
            document.getElementById('heroEyebrow').innerText = content.heroEyebrow;
            document.getElementById('heroTitle').innerHTML = content.heroTitleHtml;
            document.getElementById('heroDescription').innerText = content.heroDescription;
            document.getElementById('heroImage').src = content.heroImage;

            // Vision
            const visionTitleEl = document.getElementById('visionTitle');
            // Split text for scrubbing effect
            const words = content.visionTitle.split(' ');
            visionTitleEl.innerHTML = words.map(w => `<span>${w} </span>`).join('');
            document.getElementById('visionText').innerText = content.visionText;

            // Floating Parallax Objects
            if(document.getElementById('floatingImg1')) document.getElementById('floatingImg1').src = content.floatingImg1;
            if(document.getElementById('floatingImg2')) document.getElementById('floatingImg2').src = content.floatingImg2;
            if(document.getElementById('floatingImg3')) document.getElementById('floatingImg3').src = content.floatingImg3;

            // Works
            document.getElementById('featuredHeading').innerText = content.featuredHeading;
            document.getElementById('featuredText').innerText = content.featuredText;
            
            document.getElementById('featuredMainImage').src = content.featuredMainImage;
            document.getElementById('featuredMainLabel').innerText = content.featuredMainLabel;
            document.getElementById('featuredMainTitle').innerText = content.featuredMainTitle;

            document.getElementById('side1Image').src = content.side1Image;
            document.getElementById('side1Title').innerText = content.side1Title;
            document.getElementById('side1Text').innerText = content.side1Text;

            document.getElementById('side2Image').src = content.side2Image;
            document.getElementById('side2Title').innerText = content.side2Title;
            document.getElementById('side2Text').innerText = content.side2Text;

            // Services
            document.getElementById('service1Title').innerText = content.service1Title;
            document.getElementById('service1Text').innerText = content.service1Text;
            document.getElementById('service2Title').innerText = content.service2Title;
            document.getElementById('service2Text').innerText = content.service2Text;
            document.getElementById('service3Title').innerText = content.service3Title;
            document.getElementById('service3Text').innerText = content.service3Text;

            // Footer
            document.getElementById('contactTitle').innerText = content.contactTitle;
            document.getElementById('contactText').innerText = content.contactText;
            document.getElementById('contactPhone').innerText = content.phone;
            document.getElementById('contactPhone').href = `tel:${content.phone.replace(/[^0-9+]/g, '')}`;
            document.getElementById('contactEmail').innerText = content.email;
            document.getElementById('contactEmail').href = `mailto:${content.email}`;
            document.getElementById('navEmail').href = `mailto:${content.email}`;
            document.getElementById('contactLocation').innerText = content.location;


            // --- 2. Animations & Scroll (GSAP + Lenis) ---
            gsap.registerPlugin(ScrollTrigger);

            // Smooth Scroll Setup
            const lenis = new Lenis({
                duration: 1.2,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                direction: 'vertical',
                gestureDirection: 'vertical',
                smooth: true,
                mouseMultiplier: 1,
                smoothTouch: false,
                touchMultiplier: 2,
                infinite: false,
            });

            function raf(time) {
                lenis.raf(time);
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);

            // Connect GSAP to Lenis
            lenis.on('scroll', ScrollTrigger.update);
            gsap.ticker.add((time) => { lenis.raf(time * 1000) });
            gsap.ticker.lagSmoothing(0, 0);

            // Custom Cursor
            const cursor = document.getElementById('custom-cursor');
            document.addEventListener('mousemove', (e) => {
                gsap.to(cursor, {
                    x: e.clientX,
                    y: e.clientY,
                    duration: 0.1,
                    ease: 'power2.out'
                });
            });

            document.querySelectorAll('.hover-target').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });

            // Preloader Animation
            const tl = gsap.timeline();
            tl.to('#loader-span', { y: '0%', duration: 1, ease: 'power4.out' })
              .to('#loader-span', { y: '-100%', duration: 0.8, ease: 'power4.in', delay: 0.5 })
              .to('#loader', { height: 0, duration: 1, ease: 'expo.inOut' })
              .from('.hero-title', { y: 100, opacity: 0, duration: 1.5, ease: 'expo.out' }, "-=0.5")
              .from('.hero-eyebrow, .hero-desc', { y: 20, opacity: 0, duration: 1, stagger: 0.2, ease: 'power2.out' }, "-=1");

            // Hero Parallax
            gsap.to('.hero-bg', {
                yPercent: 30,
                ease: 'none',
                scrollTrigger: {
                    trigger: '.hero',
                    start: 'top top',
                    end: 'bottom top',
                    scrub: true
                }
            });
            gsap.to('.hero-content', {
                y: 150,
                opacity: 0,
                ease: 'none',
                scrollTrigger: {
                    trigger: '.hero',
                    start: 'top top',
                    end: 'bottom top',
                    scrub: true
                }
            });

            // Vision Text Scrub
            gsap.to('#visionTitle span', {
                opacity: 1,
                stagger: 0.1,
                ease: 'none',
                scrollTrigger: {
                    trigger: '.vision',
                    start: 'top 60%',
                    end: 'center center',
                    scrub: 1
                }
            });
            gsap.from('#visionText', {
                opacity: 0,
                y: 50,
                scrollTrigger: {
                    trigger: '#visionText',
                    start: 'top 80%',
                    end: 'top 60%',
                    scrub: 1
                }
            });

            // 3D Parallax Floating Objects
            gsap.utils.toArray('.floating-obj').forEach(obj => {
                const speed = parseFloat(obj.getAttribute('data-speed'));
                gsap.to(obj, {
                    y: 400 * speed,
                    rotation: speed > 0 ? '+=30' : '-=30', // Rotate slightly as it moves
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '.vision',
                        start: 'top bottom',
                        end: 'bottom top',
                        scrub: 1
                    }
                });
            });

            // Horizontal Scroll
            const horizontalContainer = document.getElementById('works-container');
            const getScrollAmount = () => -(horizontalContainer.scrollWidth - window.innerWidth);
            
            gsap.to(horizontalContainer, {
                x: getScrollAmount,
                ease: 'none',
                scrollTrigger: {
                    trigger: '.horizontal-wrapper',
                    start: 'top top',
                    end: () => `+=${getScrollAmount() * -1}`,
                    pin: true,
                    scrub: 1,
                    invalidateOnRefresh: true
                }
            });

            // Stacking Cards (Services)
            const cards = gsap.utils.toArray('.service-card');
            cards.forEach((card, index) => {
                gsap.to(card, {
                    scale: 0.9 - (0.05 * index),
                    opacity: 0.5,
                    scrollTrigger: {
                        trigger: card,
                        start: 'top 15vh',
                        endTrigger: '.cards-container',
                        end: 'bottom top',
                        pin: true,
                        pinSpacing: false,
                        scrub: true,
                        invalidateOnRefresh: true
                    }
                });
            });

            // Footer Reveal Parallax
            gsap.from('.footer-content', {
                y: -150,
                opacity: 0,
                ease: 'none',
                scrollTrigger: {
                    trigger: '.footer',
                    start: 'top bottom',
                    end: 'bottom bottom',
                    scrub: true
                }
            });
            
            // Refresh ScrollTrigger once DOM is loaded and images are placed
            setTimeout(() => {
                ScrollTrigger.refresh();
            }, 500);
        }

        // Initialize when window loads
        window.addEventListener('load', initSite);

    </script>
</body>
</html>
