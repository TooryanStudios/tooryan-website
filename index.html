<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooryan Studios | Digital Animation & Visual Art</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --text: #f0f0f5;
            --muted: #8b8b9e;
            --accent: #e5b05c;
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --space: clamp(2rem, 5vw, 6rem);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.04"/%3E%3C/svg%3E');
        }

        .shell {
            width: min(1400px, calc(100% - 40px));
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            mix-blend-mode: difference;
            padding: 2rem 0;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: white;
            text-decoration: none;
        }

        .menu {
            display: flex;
            gap: 3rem;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 10vh;
        }

        .hero-content {
            max-width: 900px;
            mix-blend-mode: difference;
        }

        #heroEyebrow {
            display: block;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #fff;
        }

        #heroTitle {
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #fff;
        }

        #heroTitle .stroke {
            color: transparent;
            -webkit-text-stroke: 2px #fff;
        }

        #heroDescription {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            font-weight: 300;
            max-width: 600px;
            color: #fff;
        }

        /* Editorial Typography Sections */
        .editorial-section {
            padding: var(--space) 0;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .huge-text {
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 700;
            line-height: 1;
            text-transform: uppercase;
            max-width: 1200px;
            margin-bottom: 3rem;
        }

        .huge-text span {
            color: var(--accent);
        }

        /* Glass Panels */
        .glass-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 2px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.05);
        }

        .glass-panel h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .glass-panel p {
            color: var(--muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Immersive Showcase */
        .showcase {
            position: relative;
            padding: var(--space) 0;
        }

        .showcase-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 2rem;
        }

        .showcase-large {
            width: 100%;
            height: 70vh;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 4rem;
        }

        .showcase-large::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(3,3,5,0.9), transparent);
        }

        .showcase-meta {
            position: relative;
            z-index: 2;
        }

        .showcase-meta h3 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 1rem;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--glass-border);
            padding: 4rem 0;
            margin-top: var(--space);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .contact-huge {
            font-size: clamp(2rem, 4vw, 4rem);
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 1rem;
        }

        .contact-huge:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .menu { display: none; }
            .glass-panel { padding: 2rem; }
            .showcase-large { padding: 2rem; height: 50vh; }
            .showcase-meta h3 { font-size: 2.5rem; }
            .footer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- WebGL Background -->
    <div id="canvas-container"></div>
    <div class="noise"></div>

    <nav>
        <div class="shell nav-inner">
            <a href="#" class="logo">Tooryan.</a>
            <div class="menu">
                <a href="#work">Work</a>
                <a href="#services">Studio</a>
                <a href="#contact">Contact</a>
                <a href="./admin.html">Admin</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero shell">
            <div class="hero-content">
                <span id="heroEyebrow"></span>
                <h1 id="heroTitle"></h1>
                <p id="heroDescription"></p>
            </div>
        </section>

        <section class="editorial-section shell" id="vision">
            <h2 class="huge-text" id="visionTitle"></h2>
            <p style="font-size: 1.5rem; max-width: 600px; color: var(--muted);" id="visionText"></p>
        </section>

        <section class="showcase shell" id="work">
            <div class="showcase-header">
                <h2 class="huge-text" style="margin:0;" id="featuredHeading"></h2>
                <p style="max-width: 400px; color: var(--muted); text-align: right;" id="featuredText"></p>
            </div>
            
            <div class="showcase-large" id="featuredMainImage">
                <div class="showcase-meta">
                    <span style="color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase;" id="featuredMainLabel"></span>
                    <h3 id="featuredMainTitle"></h3>
                    <div style="display: flex; gap: 2rem; margin-top: 2rem;">
                        <div>
                            <strong style="display: block;" id="featuredStat1Title"></strong>
                            <span style="color: var(--muted);" id="featuredStat1Text"></span>
                        </div>
                        <div>
                            <strong style="display: block;" id="featuredStat2Title"></strong>
                            <span style="color: var(--muted);" id="featuredStat2Text"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="editorial-section shell" id="services">
            <h2 class="huge-text">Digital<br><span>Disciplines.</span></h2>
            <div class="glass-grid">
                <div class="glass-panel">
                    <h3 id="service1Title"></h3>
                    <p id="service1Text"></p>
                </div>
                <div class="glass-panel">
                    <h3 id="service2Title"></h3>
                    <p id="service2Text"></p>
                </div>
                <div class="glass-panel">
                    <h3 id="service3Title"></h3>
                    <p id="service3Text"></p>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact">
        <div class="shell footer-grid">
            <div>
                <h2 style="font-size: 1.5rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 0.1em;" id="contactTitle"></h2>
                <p style="color: var(--muted); margin-bottom: 3rem; max-width: 400px;" id="contactText"></p>
            </div>
            <div style="text-align: right;">
                <a href="#" class="contact-huge" id="emailLink"></a>
                <a href="#" class="contact-huge" id="phoneLink" style="color: var(--muted); font-size: clamp(1.5rem, 3vw, 3rem);"></a>
            </div>
        </div>
    </footer>

    <!-- Three.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./site-config.js"></script>
    
    <script>
        // Content Mapping
        const content = window.getTooryanContent();
        const setText = (id, value) => { const el = document.getElementById(id); if (el) el.textContent = value || ''; };
        const setHtml = (id, value) => { const el = document.getElementById(id); if (el) el.innerHTML = value || ''; };
        const setBg = (id, url) => { const el = document.getElementById(id); if (el && url) el.style.backgroundImage = `url('${url}')`; };

        setText('heroEyebrow', content.heroEyebrow);
        setHtml('heroTitle', content.heroTitleHtml);
        setText('heroDescription', content.heroDescription);
        setText('visionTitle', content.visionTitle);
        setText('visionText', content.visionText);
        setText('featuredHeading', content.featuredHeading);
        setText('featuredText', content.featuredText);
        setText('featuredMainLabel', content.featuredMainLabel);
        setText('featuredMainTitle', content.featuredMainTitle);
        setBg('featuredMainImage', content.featuredMainImage);
        setText('featuredStat1Title', content.featuredStat1Title);
        setText('featuredStat1Text', content.featuredStat1Text);
        setText('featuredStat2Title', content.featuredStat2Title);
        setText('featuredStat2Text', content.featuredStat2Text);
        setText('service1Title', content.service1Title);
        setText('service1Text', content.service1Text);
        setText('service2Title', content.service2Title);
        setText('service2Text', content.service2Text);
        setText('service3Title', content.service3Title);
        setText('service3Text', content.service3Text);
        setText('contactTitle', content.contactTitle);
        setText('contactText', content.contactText);
        
        const emailLink = document.getElementById('emailLink');
        if(emailLink) {
            emailLink.textContent = content.email;
            emailLink.href = `mailto:${content.email}`;
        }
        
        const phoneLink = document.getElementById('phoneLink');
        if(phoneLink) {
            phoneLink.textContent = content.phone;
            phoneLink.href = `tel:${content.phone.replace(/\s+/g, '')}`;
        }

        // 3D Background Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create abstract shapes
        const objects = [];
        const material = new THREE.MeshPhysicalMaterial({  
            color: 0x111116,
            metalness: 0.9,
            roughness: 0.1,
            envMapIntensity: 1.0,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            wireframe: true
        });

        // Torus Knot
        const geo1 = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const mesh1 = new THREE.Mesh(geo1, material);
        mesh1.position.set(15, 0, -20);
        scene.add(mesh1);
        objects.push({mesh: mesh1, speedX: 0.001, speedY: 0.002});

        // Icosahedron
        const geo2 = new THREE.IcosahedronGeometry(8, 0);
        const mesh2 = new THREE.Mesh(geo2, material);
        mesh2.position.set(-15, 10, -30);
        scene.add(mesh2);
        objects.push({mesh: mesh2, speedX: -0.002, speedY: 0.001});

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        
        const pointLight1 = new THREE.PointLight(0xe5b05c, 2, 100);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x74f5ff, 2, 100);
        pointLight2.position.set(-10, -10, 10);
        scene.add(pointLight2);

        camera.position.z = 20;

        // Mouse Interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - window.innerWidth / 2);
            mouseY = (event.clientY - window.innerHeight / 2);
        });

        // Scroll Interaction
        let scrollY = 0;
        window.addEventListener('scroll', () => {
            scrollY = window.scrollY;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            objects.forEach(obj => {
                obj.mesh.rotation.x += obj.speedX;
                obj.mesh.rotation.y += obj.speedY;
                
                // Subtle mouse parallax
                obj.mesh.position.x += (targetX * 5 - obj.mesh.position.x + (obj === objects[0] ? 15 : -15)) * 0.05;
                obj.mesh.position.y += (-targetY * 5 - obj.mesh.position.y + (obj === objects[0] ? 0 : 10)) * 0.05;
            });

            // Camera scroll parallax
            camera.position.y = -scrollY * 0.01;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
